<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GddaFi Gold</title>

<style>
  * {
    margin:0;
    padding:0;
    box-sizing:border-box;
  }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a0a;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    direction: rtl;
  }
  .container {
    background: #1a1a1a;
    border-radius: 20px;
    box-shadow: 0 0 20px gold;
    width: 320px;
    max-width: 100%;
    padding: 30px 20px;
    text-align: center;
  }
  .header {
    font-size: 28px;
    margin-bottom: 10px;
    font-weight: 700;
    color: gold;
  }
  .balance {
    font-size: 48px;
    color: #ffda00;
    text-shadow: 0 0 12px #ffd700, 0 0 30px #ffea00;
    margin-bottom: 20px;
    font-family: 'Courier New', Courier, monospace;
  }
  .coin {
    width: 180px;
    height: 180px;
    margin: 0 auto 20px auto;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 40px gold, 0 0 80px rgba(255, 215, 0, 0.4);
    background: black;
    animation: float 3s infinite ease-in-out;
    cursor: default;
  }
  .coin img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(1.2) contrast(1.1);
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  .referrals {
    margin-bottom: 25px;
    font-size: 18px;
    color: #3498db;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  .referrals span {
    font-weight: 600;
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
  }
  button {
    background: #6a00ff;
    border: none;
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 0 10px #6a00ff88;
    transition: background 0.3s ease;
    flex: 1 1 120px;
  }
  button:hover {
    background: #8500ff;
    box-shadow: 0 0 20px #8500ffcc;
  }
  /* Adsterra banner box */
  .ad-box {
    margin-top: 30px;
    display: flex;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">💰 GddaFi Gold</div>
  <div class="balance" id="balance">1.003129</div>

  <div class="coin">
    <img src="https://i.imgur.com/8Km9tLL.png" alt="دينار القدافي الذهبي" />
  </div>

  <div class="referrals">
    <span>الإحالات: 0</span> 👥
  </div>

  <div class="buttons">
    <button id="mineBtn">⛏️ تعدين</button>
    <button id="dailyBtn">🎁 يومي</button>
    <button id="boostBtn">⚡ تعزيز</button>
    <button id="referralBtn">👥 إحالة</button>
  </div>

  <div class="ad-box">
    <script src="https://pl29042900.profitablecpmratenetwork.com/67/d9/1b/67d91bfab7947c9808641625010d7e0c.js"></script>
  </div>
</div>

<script>
  const balanceEl = document.getElementById('balance');
  const referralsEl = document.querySelector('.referrals span');

  let balance = 1.003129;
  let referrals = 0;

  document.getElementById('mineBtn').addEventListener('click', () => {
    balance += 0.001;
    updateDisplay();
  });

  document.getElementById('dailyBtn').addEventListener('click', () => {
    balance += 0.005;
    updateDisplay();
  });

  document.getElementById('boostBtn').addEventListener('click', () => {
    balance *= 1.02;
    updateDisplay();
  });

  document.getElementById('referralBtn').addEventListener('click', () => {
    referrals += 1;
    balance += 0.002;
    updateDisplay();
  });

  function updateDisplay() {
    balanceEl.textContent = balance.toFixed(6);
    referralsEl.textContent = `الإحالات: ${referrals}`;
  }
</script>

</body>
</html>
