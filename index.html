<script>
    (function() {
        // ---------- تهيئة تليجرام ----------
        let tg;
        try {
            tg = window.Telegram?.WebApp;
            if (!tg) throw new Error();
            tg.ready();
            tg.expand();
        } catch(e) {
            tg = {
                ready: () => {},
                expand: () => {},
                close: () => {},
                showAlert: (msg) => alert(msg),
                showConfirm: (msg, callback) => { callback(confirm(msg)); },
                HapticFeedback: { impactOccurred: () => {} },
                openTelegramLink: (url) => window.open(url, '_blank')
            };
        }
        window.tg = tg;

        // ---------- نظام الصوت المتقدم (Howler) ----------
        let rainSound = null;
        let thunderSound = null;
        let isSoundOn = false;
        let soundAllowed = false; // يحتاج تفاعل المستخدم أولاً
        let rainLoopId = null;
        let thunderTimeout = null;
        
        function initSounds() {
            if (rainSound) return;
            // إنشاء أصوات باستخدام Howler (مكتبة قوية)
            rainSound = new Howl({
                src: ['https://www.soundjay.com/nature/rain-01.mp3'], // رابط تجريبي لمطر (يمكن استبداله)
                loop: true,
                volume: 0.3,
                autoplay: false
            });
            thunderSound = new Howl({
                src: ['https://www.soundjay.com/nature/thunder-01.mp3'], // رابط تجريبي لرعد
                volume: 0.6,
                autoplay: false
            });
            // إذا فشل تحميل الروابط، نستخدم Web Audio API كبديل (محلي)
            if (!rainSound._src || !rainSound._src.length) {
                // البديل: استخدام Web Audio API لتوليد أصوات صناعية
                console.log("Using fallback Web Audio");
                setupFallbackAudio();
            }
        }
        
        // بديل Web Audio API (صوت مطر ورعد صناعي)
        let audioCtx = null;
        let rainInterval = null;
        function setupFallbackAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                rainSound = {
                    play: () => {
                        if (rainInterval) clearInterval(rainInterval);
                        rainInterval = setInterval(() => {
                            if (!isSoundOn || !soundAllowed) return;
                            const now = audioCtx.currentTime;
                            const osc = audioCtx.createOscillator();
                            const gain = audioCtx.createGain();
                            osc.type = 'sine';
                            osc.frequency.value = 2000 + Math.random() * 1000;
                            gain.gain.value = 0.03;
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.start();
                            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
                            osc.stop(now + 0.2);
                        }, 150);
                    },
                    stop: () => {
                        if (rainInterval) clearInterval(rainInterval);
                        rainInterval = null;
                    }
                };
                thunderSound = {
                    play: () => {
                        if (!isSoundOn || !soundAllowed) return;
                        const now = audioCtx.currentTime;
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.value = 80;
                        gain.gain.value = 0.4;
                        const filter = audioCtx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 200;
                        osc.connect(filter);
                        filter.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start();
                        gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
                        osc.stop(now + 1.5);
                        osc.frequency.exponentialRampToValueAtTime(30, now + 0.8);
                    }
                };
            } catch(e) { console.warn(e); }
        }
        
        function enableSound() {
            if (!soundAllowed) {
                // أول مرة: نطلب تفعيل الصوت بعد تفاعل المستخدم
                soundAllowed = true;
                initSounds();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                isSoundOn = true;
                if (rainSound) rainSound.play();
                scheduleRandomThunder();
                updateSoundButton();
                document.getElementById('soundHint').style.display = 'none';
            } else if (!isSoundOn) {
                isSoundOn = true;
                if (rainSound) rainSound.play();
                scheduleRandomThunder();
                updateSoundButton();
            }
        }
        
        function disableSound() {
            isSoundOn = false;
            if (rainSound) rainSound.stop();
            if (thunderTimeout) clearTimeout(thunderTimeout);
            thunderTimeout = null;
            updateSoundButton();
        }
        
        function toggleSound() {
            if (!soundAllowed) {
                enableSound();
            } else if (isSoundOn) {
                disableSound();
            } else {
                enableSound();
            }
        }
        
        function scheduleRandomThunder() {
            if (thunderTimeout) clearTimeout(thunderTimeout);
            const delay = 20000 + Math.random() * 20000;
            thunderTimeout = setTimeout(() => {
                if (isSoundOn && soundAllowed && thunderSound) {
                    thunderSound.play();
                }
                scheduleRandomThunder();
            }, delay);
        }
        
        function updateSoundButton() {
            const btn = document.getElementById('soundToggle');
            if (isSoundOn && soundAllowed) btn.innerHTML = '🔊 إيقاف الصوت';
            else btn.innerHTML = '🔇 تشغيل الصوت';
        }
        
        // تفعيل الصوت عند أول نقرة (لتفادي قيود المتصفح)
        function firstInteraction() {
            if (!soundAllowed) {
                enableSound();
            }
        }
        
        // ربط أول نقرة بالصفحة
        document.body.addEventListener('click', firstInteraction, { once: true });
        // وأيضاً نربط الأزرار الهامة
        const interactiveElements = ['coinImg', 'mBtn', 'boostBtn', 'txt-invite', 'txt-wallet', 'langSelect', 'soundToggle'];
        interactiveElements.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', firstInteraction);
        });
        
        // إظهار تلميح الصوت إذا لم يتم تفعيله خلال 2 ثانية
        setTimeout(() => {
            if (!soundAllowed) {
                document.getElementById('soundHint').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('soundHint').style.display = 'none';
                }, 5000);
            }
        }, 2000);
        
        document.getElementById('soundToggle').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSound();
        });
        
        // ---------- إعلانات Adsterra مرتبطة بجميع الأزرار ----------
        function triggerAdAndAction(actionCallback) {
            // عرض إعلان Adsterra أولاً
            try {
                if (typeof showAdsterraAd === 'function') showAdsterraAd();
                else if (window.adsterra && window.adsterra.show) window.adsterra.show();
            } catch(e) {}
            // تنفيذ الإجراء بعد فترة قصيرة (لإعطاء وقت للإعلان)
            setTimeout(() => {
                if (actionCallback) actionCallback();
            }, 50);
        }
        
        // ---------- نظام التعزيزات المعدل (24 ساعة من آخر إعادة تعيين) ----------
        let boostCount = 7;
        let lastResetTimestamp = localStorage.getItem('g_lastResetTimestamp') ? parseInt(localStorage.getItem('g_lastResetTimestamp')) : 0;
        const ONE_DAY = 24 * 60 * 60 * 1000;
        
        function checkAndResetBoosts() {
            const now = Date.now();
            if (lastResetTimestamp === 0 || (now - lastResetTimestamp) >= ONE_DAY) {
                // إعادة ضبط التعزيزات إلى 7
                boostCount = 7;
                lastResetTimestamp = now;
                localStorage.setItem('g_lastResetTimestamp', lastResetTimestamp);
                localStorage.setItem('g_boostCount', boostCount);
                updateUI();
            } else {
                // استعادة العدد المحفوظ
                let saved = localStorage.getItem('g_boostCount');
                if (saved !== null) boostCount = parseInt(saved);
                else boostCount = 7;
            }
        }
        
        function useBoost() {
            if (boostCount > 0) {
                boostCount--;
                localStorage.setItem('g_boostCount', boostCount);
                updateUI();
                return true;
            }
            return false;
        }
        
        // ---------- باقي بيانات اللعبة ----------
        let balance = parseFloat(localStorage.getItem('g_bal')) || 0.0;
        let isMining = localStorage.getItem('g_mining') === 'true';
        
        // الترجمة
        const translations = {
            ar: { wallet: "🏦 المحفظة", tokens: "GDAFi TOKENS", title: "COIN GDDAFI", mine: "تعدين رئيسي", invite: "إحالة صديق (+0.005)", home: "الرئيسية", mining: "تعدين", tasks: "مهام", friends: "أصدقاء", boost: "تعزيز", miningStatus: "+1 عملة كل 24 ساعة", miningActive: "⚠️ التعدين نشط ⚠️", miningInactive: "🔴 التعدين متوقف 🔴" },
            en: { wallet: "🏦 Wallet", tokens: "GDAFi TOKENS", title: "COIN GDDAFI", mine: "Main Mining", invite: "Invite Friend (+0.005)", home: "Home", mining: "Mine", tasks: "Tasks", friends: "Friends", boost: "Boost", miningStatus: "+1 coin every 24h", miningActive: "⚠️ Mining Active ⚠️", miningInactive: "🔴 Mining Stopped 🔴" },
            zh: { wallet: "🏦 钱包", tokens: "GDAFi 代币", title: "GDDAFI 金币", mine: "开始采矿", invite: "邀请朋友 (+0.005)", home: "首页", mining: "采矿", tasks: "任务", friends: "朋友", boost: "增强", miningStatus: "每24小时 +1 币", miningActive: "⚠️ 挖矿中 ⚠️", miningInactive: "🔴 挖矿已停止 🔴" },
            fa: { wallet: "🏦 کیف پول", tokens: "توکن گدافی", title: "سکه گدافی", mine: "استخراج اصلی", invite: "دعوت دوستان (+0.005)", home: "خانه", mining: "استخراج", tasks: "وظایف", friends: "دوستان", boost: "تقویت", miningStatus: "+1 سکه هر ۲۴ ساعت", miningActive: "⚠️ استخراج فعال ⚠️", miningInactive: "🔴 استخراج متوقف 🔴" }
        };
        
        function updateUI() {
            document.getElementById('balDisplay').innerText = balance.toFixed(6);
            document.getElementById('bLeft').innerText = boostCount;
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            if (t) {
                const statusText = isMining ? t.miningActive : t.miningInactive;
                document.getElementById('mStatus').innerHTML = t.miningStatus + '<br><small style="color:#ffaa00;">' + statusText + '</small>';
                document.getElementById('boostBtn').innerHTML = t.boost + ' (<span id="bLeft">' + boostCount + '</span>/7)';
                document.getElementById('bLeft').innerText = boostCount;
            }
        }
        
        function saveData() {
            localStorage.setItem('g_bal', balance.toFixed(6));
            localStorage.setItem('g_mining', isMining);
            localStorage.setItem('g_boostCount', boostCount);
            localStorage.setItem('g_lastResetTimestamp', lastResetTimestamp);
        }
        
        // إجراءات اللعبة مع الإعلانات
        function manualTap() {
            triggerAdAndAction(() => {
                balance += 0.0001;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                updateUI();
                saveData();
            });
        }
        
        function toggleMining() {
            triggerAdAndAction(() => {
                if (!isMining) {
                    tg.showConfirm("⚠️ هل تريد بدء التعدين السحابي؟", (confirmed) => {
                        if (confirmed) {
                            isMining = true;
                            saveData();
                            updateUI();
                            tg.showAlert("✅ تم بدء التعدين!");
                        }
                    });
                } else {
                    tg.showConfirm("⛔ هل تريد إيقاف التعدين؟", (confirmed) => {
                        if (confirmed) {
                            isMining = false;
                            saveData();
                            updateUI();
                            tg.showAlert("🔴 تم إيقاف التعدين.");
                        }
                    });
                }
            });
        }
        
        function doBoost() {
            triggerAdAndAction(() => {
                if (useBoost()) {
                    balance += 0.005;
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                    updateUI();
                    saveData();
                    tg.showAlert("✨ تمت الإضافة! +0.005 GDAFi");
                } else {
                    tg.showAlert("❗ نفذت التعزيزات! انتظر حتى الغد.");
                }
            });
        }
        
        function doInviteFriends() {
            triggerAdAndAction(() => {
                const botUser = "GddaFiPlay_bot";
                const shareText = encodeURIComponent("🔥 انضم إلي في تعدين عملة القذافي واربح عملات مجانية! 🔥");
                const inviteLink = `https://t.me/share/url?url=https://t.me/${botUser}?start=ref_${Math.floor(Date.now() / 1000)}&text=${shareText}`;
                tg.openTelegramLink(inviteLink);
            });
        }
        
        function changeLang() {
            const l = document.getElementById('langSelect').value;
            const t = translations[l];
            if (!t) return;
            document.getElementById('txt-wallet').innerText = t.wallet;
            document.getElementById('txt-tokens').innerText = t.tokens;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('mBtn').innerText = t.mine;
            document.getElementById('txt-invite').innerText = t.invite;
            document.getElementById('nav-home').innerText = t.home;
            document.getElementById('nav-mine').innerText = t.mining;
            document.getElementById('nav-tasks').innerText = t.tasks;
            document.getElementById('nav-friends').innerText = t.friends;
            updateUI();
        }
        
        // التعدين التلقائي
        let lastTimestamp = Date.now();
        setInterval(() => {
            if (isMining) {
                const now = Date.now();
                const secondsPassed = (now - lastTimestamp) / 1000;
                if (secondsPassed > 0 && secondsPassed < 5) {
                    balance += (1 / 86400) * secondsPassed;
                    updateUI();
                    saveData();
                }
                lastTimestamp = now;
            } else {
                lastTimestamp = Date.now();
            }
        }, 1000);
        
        // ربط الأزرار مع الإعلانات
        document.getElementById('coinImg').addEventListener('click', manualTap);
        document.getElementById('mBtn').addEventListener('click', toggleMining);
        document.getElementById('boostBtn').addEventListener('click', doBoost);
        document.getElementById('txt-invite').addEventListener('click', doInviteFriends);
        document.getElementById('langSelect').addEventListener('change', changeLang);
        document.getElementById('txt-wallet').addEventListener('click', () => triggerAdAndAction(() => tg.showAlert("🔧 قريباً: ربط المحفظة الحقيقية")));
        
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tab = btn.getAttribute('data-tab');
                if (tab === 'friends') doInviteFriends();
                else if (tab === 'home') {
                    navLinks.forEach(l => l.classList.remove('active'));
                    btn.classList.add('active');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    triggerAdAndAction(() => tg.showAlert("✨ قريباً في التحديث القادم!"));
                }
            });
        });
        
        // التهيئة
        checkAndResetBoosts();
        updateUI();
        changeLang();
        updateSoundButton();
        
        // حفظ البيانات عند الإغلاق
        window.addEventListener('beforeunload', () => saveData());
        
        // استعادة حالة الصوت من localStorage (اختياري)
        const savedSound = localStorage.getItem('soundEnabled');
        if (savedSound === 'true') {
            // سيتم تفعيل الصوت عند أول نقرة
            soundAllowed = false;
            isSoundOn = false;
        }
    })();
</script>
</body>
</html>
