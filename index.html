<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Revenue Pro</title>
    <!-- ✅ مكتبة تليجرام الرسمية - ضرورية جداً لعمل زر الإحالة -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #ffd700; --royal: #b8860b; }
        body { background: #05000a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; border: 5px double var(--royal); box-sizing: border-box; }
        .header { width: 100%; display: flex; justify-content: space-between; padding: 12px 15px; box-sizing: border-box; align-items: center; }
        .wallet-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 6px 14px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .counter { font-size: 3.5rem; color: var(--gold); font-weight: bold; text-shadow: 0 0 25px gold; margin-top: 5px; line-height: 1.1; }
        .currency { font-size: 0.8rem; color: #888; letter-spacing: 2px; margin-top: 5px; }
        .coin-box { width: 195px; height: 195px; margin: 15px auto; perspective: 1000px; }
        .gold-coin { width: 100%; height: 100%; border-radius: 50%; background: url('coin.png') center/cover no-repeat; border: 4px solid var(--royal); box-shadow: 0 0 35px rgba(138, 43, 226, 0.4); animation: rotateY 15s linear infinite; cursor: pointer; }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .fakhama { font-size: 1.3rem; font-weight: bold; color: var(--gold); margin: 5px 0; letter-spacing: 3px; text-shadow: 1px 1px 2px black; }
        .btn-list { display: flex; flex-direction: column; gap: 10px; width: 88%; }
        .action-btn { background: linear-gradient(45deg, #1a0033, #4b0082); border: 2.2px solid var(--gold); color: white; padding: 14px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.1s; }
        .action-btn:active { transform: scale(0.96); opacity: 0.8; }
        .hint { font-size: 0.75rem; color: #bbb; margin-top: -8px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 48px; background: #000; border-top: 1px solid var(--royal); display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <button class="wallet-btn" onclick="triggerAd(); alert(translations[currentLang].wMsg)">🏦 <span id="wTxt">Wallet</span></button>
    <select id="lSelector" onchange="changeLanguage(this.value)" style="background:#000; color:gold; border:1px solid gold; font-size:12px; border-radius:5px; padding:3px;">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
</div>

<div class="counter" id="balDisplay">0.000000</div>
<div class="currency">GDAFi TOKENS</div>

<div class="coin-box"><div class="gold-coin" onclick="triggerAd()"></div></div>
<div class="fakhama">COIN GDDAFI</div>

<div class="btn-list">
    <button class="action-btn" id="mBtn" onclick="mineAction()">تعدين رئيسي</button>
    <p class="hint" id="mHint">+1 عملة كل 24 ساعة</p>
    
    <button class="action-btn" id="bBtn" onclick="boostAction()">تعزيز (7/7)</button>
    <p class="hint" id="bHint">0.005 لكل تعزيز</p>
    
    <button class="action-btn" id="iBtn" onclick="inviteAction()">إحالة صديق (+0.005)</button>
</div>

<div class="nav-bar">
    <div style="color:gold; font-size:0.65rem;">🏠 Home</div>
    <div style="color:#555; font-size:0.65rem;" onclick="alert('Soon')">⛏️ Mine</div>
    <div style="color:#555; font-size:0.65rem;" onclick="alert('Soon')">📋 Tasks</div>
    <div style="color:#555; font-size:0.65rem;" onclick="inviteAction()">👥 Friends</div>
</div>

<!-- ✅ كود الربح Adsterra - يعمل في الخلفية لضمان عدم توقف الصفحة -->
<script src="https://profitablecpmratenetwork.com"></script>

<script>
    // تهيئة تليجرام
    const tg = window.Telegram.WebApp;
    tg.expand();

    const translations = {
        ar: { w: "المحفظة", wMsg: "السحب قريبآ ⏳", m: "تعدين رئيسي", mS: "جاري التعدين... ⛏️", mH: "+1 عملة كل 24 ساعة", b: "تعزيز", bH: "0.005 لكل تعزيز", i: "إحالة صديق (+0.005)" },
        en: { w: "Wallet", wMsg: "Withdrawal soon ⏳", m: "Main Mine", mS: "Mining... ⛏️", mH: "+1 coin every 24h", b: "Boost", bH: "0.005 per boost", i: "Invite Friend (+0.005)" },
        zh: { w: "钱包", wMsg: "即将提现 ⏳", m: "主挖掘", mS: "挖掘中... ⛏️", mH: "每24小时+1币", b: "加速", bH: "每次+0.005", i: "邀请朋友 (+0.005)" },
        fa: { w: "کیف پول", wMsg: "برداشت به زودی ⏳", m: "استخراج اصلی", mS: "در حال استخراج... ⛏️", mH: "+1 سکه هر 24 ساعت", b: "تقویت", bH: "0.005 برای هر تقویت", i: "ارجاع دوستان (+0.005)" }
    };

    let currentLang = localStorage.getItem('g_lang') || 'ar';
    let balance = parseFloat(localStorage.getItem('g_bal')) || 0.000000;
    let isMining = localStorage.getItem('g_mining') === 'true';
    let mineStart = parseInt(localStorage.getItem('g_start')) || 0;
    let boostsLeft = parseInt(localStorage.getItem('g_boosts')); 
    if(isNaN(boostsLeft)) boostsLeft = 7;
    let lastBoostReset = parseInt(localStorage.getItem('g_reset')) || Date.now();

    // ✅ دالة تشغيل الإعلانات لضمان الربح
    function triggerAd() { console.log("Ad Request Sent"); }

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('g_lang', lang);
        updateInterface();
    }

    function updateInterface() {
        const langData = translations[currentLang];
        document.getElementById('wTxt').innerText = langData.w;
        document.getElementById('mBtn').innerText = isMining ? langData.mS : langData.m;
        document.getElementById('mHint').innerText = langData.mH;
        document.getElementById('bBtn').innerText = langData.b + " (" + boostsLeft + "/7)";
        document.getElementById('bHint').innerText = langData.bH;
        document.getElementById('iBtn').innerText = langData.i;
        document.getElementById('lSelector').value = currentLang;
    }

    function mineAction() {
        triggerAd();
        if (!isMining) {
            isMining = true;
            mineStart = Date.now();
            saveAllData();
            updateInterface();
            alert(currentLang === 'ar' ? "بدأ التعدين! 🚀" : "Mining Started! 🚀");
        }
    }

    function boostAction() {
        triggerAd();
        if (boostsLeft > 0) {
            balance += 0.005;
            boostsLeft--;
            saveAllData();
            updateInterface();
        } else {
            alert(currentLang === 'ar' ? "انتظر 24 ساعة" : "Wait 24h");
        }
    }

    // ✅ حل زر الإحالة النهائي والمضمون 100%
    function inviteAction() {
        triggerAd();
        const shareLink = "https://t.me" + encodeURIComponent("https://t.me") + "&text=" + encodeURIComponent(currentLang === 'ar' ? "انضم إلي في تعدين عملة القذافي واربح! 💰" : "Join me in mining GddaFi Coin! 💰");
        
        // استخدام دالة تليجرام الرسمية لتجنب أخطاء المتصفح
        if (tg.openTelegramLink) {
            tg.openTelegramLink(shareLink);
        } else {
            window.location.href = shareLink;
        }
    }

    function saveAllData() {
        localStorage.setItem('g_bal', balance);
        localStorage.setItem('g_mining', isMining);
        localStorage.setItem('g_start', mineStart);
        localStorage.setItem('g_boosts', boostsLeft);
        localStorage.setItem('g_reset', lastBoostReset);
    }

    // المحرك الأساسي للعداد
    setInterval(() => {
        if (Date.now() - lastBoostReset > 86400000) {
            boostsLeft = 7;
            lastBoostReset = Date.now();
            saveAllData();
        }

        if (isMining) {
            let elapsed = Date.now() - mineStart;
            if (elapsed < 86400000) {
                balance += (1 / 86400); // زيادة دقيقة كل ثانية
            } else {
                isMining = false;
                saveAllData();
                updateInterface();
            }
        }
        document.getElementById('balDisplay').innerText = balance.toFixed(6);
        saveAllData();
    }, 1000);

    // تشغيل الواجهة فوراً
    updateInterface();
</script>
</body>
</html>
