<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Royal</title>
    <script src="https://telegram.org"></script>
    <script src="https://profitablecpmratenetwork.com" async></script>
    <style>
        :root { --gold: #ffd700; --bg: #05000a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .header { margin-top: 30px; text-align: center; }
        #bal { font-size: 3.5rem; color: var(--gold); font-weight: bold; text-shadow: 0 0 15px gold; }
        
        /* تأثير دوران الصورة */
        .image-container { width: 280px; height: 280px; margin: 25px auto; }
        .main-img { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.4));
            border-radius: 50%;
        }
        .rotate-anim { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* تنسيق الأزرار */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 92%; margin-top: 5px; }
        .btn { 
            background: rgba(17, 17, 17, 0.9); border: 2px solid var(--gold); color: var(--gold); 
            padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer;
            font-size: 1.1rem; text-align: center; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: var(--gold); color: #000; }
        
        .status { margin-top: 20px; color: #888; font-size: 0.85rem; text-align: center; padding: 0 10px; }
    </style>
</head>
<body>

<div class="header">
    <div id="bal">0.000000</div>
    <div style="color:#666; font-size:0.8rem; letter-spacing: 2px;">GDAFi TOKENS</div>
</div>

<div class="image-container">
    <img src="coin.png" id="coinImg" class="main-img" alt="GddaFi Coin">
</div>

<div class="controls">
    <div class="btn" onclick="startMine()">⛏️ ابدأ التعدين</div>
    <div class="btn" id="boostBtn" onclick="doBoost()">⚡ تعزيز (7/7)</div>
    <div class="btn" onclick="invite()">👥 إحالة صديق</div>
    <div class="btn" onclick="showWallet()">🏦 المحفظة</div>
</div>

<div class="status" id="st">انقر على "ابدأ التعدين" لتنشيط العداد</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = parseFloat(localStorage.getItem('g_b')) || 0;
    let bLeft = parseInt(localStorage.getItem('g_bl')) ?? 7;
    let isMining = localStorage.getItem('g_im') === 'true';
    let bReset = parseInt(localStorage.getItem('g_br')) || Date.now();

    function updateUI() {
        document.getElementById('bal').innerText = balance.toFixed(6);
        document.getElementById('boostBtn').innerText = `⚡ تعزيز (${bLeft}/7)`;
        
        if (isMining) {
            document.getElementById('coinImg').classList.add('rotate-anim');
            document.getElementById('st').innerText = "التعدين نشط (1 عملة / 24 ساعة)";
        }
        
        localStorage.setItem('g_b', balance);
        localStorage.setItem('g_bl', bLeft);
        localStorage.setItem('g_im', isMining);
        localStorage.setItem('g_br', bReset);
    }

    function startMine() {
        if (!isMining) {
            isMining = true;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("بدأت عملية التعدين بنجاح! 🚀");
            updateUI();
        }
    }

    function doBoost() {
        if (bLeft > 0) {
            balance += 0.005;
            bLeft--;
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        } else {
            tg.showAlert("لقد استهلكت جميع تعزيزات اليوم (7/7).");
        }
    }

    function showWallet() {
        tg.showAlert("السحب قريباً عبر شبكة USDT/TRC20 ⏳");
    }

    function invite() {
        const link = "https://t.me" + encodeURIComponent("انضم إلي في تعدين عملة القذافي واربح! 💰");
        tg.openTelegramLink(link);
    }

    // محرك التعدين المجهري (1 عملة لكل 24 ساعة)
    setInterval(() => {
        // تصفير التعزيزات كل 24 ساعة
        if (Date.now() - bReset > 86400000) {
            bLeft = 7;
            bReset = Date.now();
        }

        if (isMining) {
            // إضافة مقدار ضئيل جداً كل ثانية (1 مقسوم على 86400 ثانية)
            balance += (1 / 86400);
            updateUI();
        }
    }, 1000);

    // تشغيل الواجهة عند التحميل
    updateUI();
</script>
</body>
</html>
