<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Crypto Pro</title>
    
    <!-- ✅ كود أرباح Adsterra الخاص بك -->
    <script src="https://profitablecpmratenetwork.com"></script>
    <!-- ✅ مكتبة تليجرام الرسمية -->
    <script src="https://telegram.org"></script>

    <style>
        :root { --gold: #ffd700; --royal: #b8860b; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background: #05000a; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden; 
            /* ✅ إطار الواجهة الاحترافي الشامل */
            border: 1.5px solid var(--royal); border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(184, 134, 11, 0.5);
            box-sizing: border-box; touch-action: manipulation;
        }

        .header { width: 100%; display: flex; justify-content: space-between; padding: 12px 15px; align-items: center; }
        .wallet-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: bold; }

        .counter-box { margin-top: 10px; text-align: center; }
        .counter { font-size: 3rem; color: var(--gold); font-weight: 800; text-shadow: 0 0 20px gold; line-height: 1; }
        .currency { font-size: 0.75rem; color: #777; letter-spacing: 2px; margin-top: 5px; }

        .coin-aura {
            width: 190px; height: 190px; margin: 15px auto;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
        }
        .gold-coin { 
            width: 170px; height: 170px; border-radius: 50%; 
            background: url('coin.png') center/cover no-repeat; 
            border: 1.5px solid var(--gold); animation: rotateY 15s linear infinite; cursor: pointer;
        }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .fakhama-title { font-size: 1.1rem; font-weight: bold; color: var(--gold); margin-bottom: 10px; letter-spacing: 3px; }

        .btn-list { display: flex; flex-direction: column; gap: 10px; width: 85%; }
        .action-btn { 
            background: linear-gradient(135deg, #1a0033, #330066); border: 1px solid var(--gold);
            color: white; padding: 12px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .action-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* ✅ الأزرار السفلية المبلورة (الكبسولات) */
        .bottom-nav { 
            position: fixed; bottom: 15px; width: 92%; height: 60px; 
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            border-radius: 40px; border: 0.5px solid rgba(184, 134, 11, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .nav-link { 
            color: #555; font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; 
            gap: 2px; cursor: pointer; transition: 0.3s; padding: 8px 12px; border-radius: 20px;
        }
        .nav-link.active { 
            color: var(--gold); background: rgba(255, 215, 0, 0.1); 
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2); 
        }
        .nav-link b { font-size: 18px; display: block; }
    </style>
</head>
<body>

<div class="header">
    <button id="txt-wallet" class="wallet-btn" onclick="tg.showAlert('Coming Soon...')">🏦 المحفظة</button>
    <select id="langSelect" onchange="changeLang()" style="background:#000; color:gold; border:1px solid gold; border-radius:5px; padding:3px; font-size:10px;">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
</div>

<div class="counter-box">
    <div class="counter" id="balDisplay">0.000000</div>
    <div id="txt-tokens" class="currency">GDAFi TOKENS</div>
</div>

<div class="coin-aura">
    <div class="gold-coin" onclick="manualTap()"></div>
</div>

<div id="txt-title" class="fakhama-title">COIN GDDAFI</div>

<div class="btn-list">
    <button class="action-btn" id="mBtn" onclick="startMining()">تعدين رئيسي</button>
    <p class="hint-text" id="mStatus" style="text-align:center; font-size:0.65rem; color:#888; margin-top:-5px;">+1 عملة كل 24 ساعة</p>
    
    <button class="action-btn" id="boostBtn" onclick="doBoost()">تعزيز (<span id="bLeft">7</span>/7)</button>
    
    <button id="txt-invite" class="action-btn" onclick="doInviteFriends()">إحالة صديق (+0.005)</button>
</div>

<div class="bottom-nav">
    <div class="nav-link active"><b>🏠</b> <span id="nav-home">الرئيسية</span></div>
    <div class="nav-link" onclick="tg.showAlert('Soon')"><b>⛏️</b> <span id="nav-mine">تعدين</span></div>
    <div class="nav-link" onclick="tg.showAlert('Soon')"><b>📋</b> <span id="nav-tasks">مهام</span></div>
    <div class="nav-link" onclick="doInviteFriends()"><b>👥</b> <span id="nav-friends">أصدقاء</span></div>
</div>

<script>
    // ✅ تهيئة تليجرام أولاً لضمان عدم تعطل الأزرار
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let balance = parseFloat(localStorage.getItem('g_bal')) || 0.000000;
    let bCount = localStorage.getItem('g_bCount') !== null ? parseInt(localStorage.getItem('g_bCount')) : 7;
    let isMining = localStorage.getItem('g_mining') === 'true';

    const translations = {
        ar: { wallet: "🏦 المحفظة", tokens: "GDAFi TOKENS", title: "COIN GDDAFI", mine: "تعدين رئيسي", invite: "إحالة صديق", home: "الرئيسية", mining: "تعدين", tasks: "مهام", friends: "أصدقاء" },
        en: { wallet: "🏦 Wallet", tokens: "GDAFi TOKENS", title: "COIN GDDAFI", mine: "Main Mining", invite: "Invite Friend", home: "Home", mining: "Mine", tasks: "Tasks", friends: "Friends" },
        zh: { wallet: "🏦 钱包", tokens: "GDAFi 代币", title: "GDDAFI 金币", mine: "开始采矿", invite: "邀请朋友", home: "首页", mining: "采矿", tasks: "任务", friends: "朋友" },
        fa: { wallet: "🏦 کیف پول", tokens: "توکن گدافی", title: "سکه گدافی", mine: "استخراج اصلی", invite: "دعوت دوستان", home: "خانه", mining: "استخراج", tasks: "وظایف", friends: "دوستان" }
    };

    function changeLang() {
        const l = document.getElementById('langSelect').value;
        const t = translations[l];
        document.getElementById('txt-wallet').innerText = t.wallet;
        document.getElementById('txt-tokens').innerText = t.tokens;
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('mBtn').innerText = t.mine;
        document.getElementById('txt-invite').innerText = t.invite;
        document.getElementById('nav-home').innerText = t.home;
        document.getElementById('nav-mine').innerText = t.mining;
        document.getElementById('nav-tasks').innerText = t.tasks;
        document.getElementById('nav-friends').innerText = t.friends;
    }

    function manualTap() { 
        balance += 0.0001; 
        tg.HapticFeedback.impactOccurred('light');
        updateUI(); 
        save(); 
    }

    function startMining() {
        if(!isMining) { 
            isMining = true; 
            localStorage.setItem('g_mining', 'true'); 
            tg.showConfirm("هل تريد بدء التعدين السحابي؟"); 
        }
    }

    function doBoost() {
        if(bCount > 0) { 
            balance += 0.005; 
            bCount--; 
            tg.HapticFeedback.impactOccurred('medium');
            updateUI(); 
            save(); 
        } else { tg.showAlert("نفذت التعزيزات المتاحة!"); }
    }

    function doInviteFriends() {
        const botUser = "GddaFiPlay_bot";
        const shareMsg = encodeURIComponent("انضم إلي في تعدين عملة القذافي واربح! 💰");
        const shareUrl = `https://t.me{botUser}?start=user&text=${shareMsg}`;
        tg.openTelegramLink(shareUrl);
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = balance.toFixed(6);
        document.getElementById('bLeft').innerText = bCount;
    }

    function save() {
        localStorage.setItem('g_bal', balance);
        localStorage.setItem('g_bCount', bCount);
    }

    setInterval(() => { if(isMining) { balance += (1/86400); updateUI(); save(); } }, 1000);
    updateUI();
</script>
</body>
</html>
