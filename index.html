<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play</title>
    <style>
        body { background: #05000a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: #1a0033; }
        .lang-select { background: #8a2be2; color: white; border: 1px solid gold; border-radius: 5px; padding: 5px; }
        .wallet-btn { background: none; border: 1px solid #8a2be2; color: gold; padding: 5px 15px; border-radius: 10px; cursor: pointer; }
        .counter { font-size: 3.5rem; color: gold; margin: 25px 0; font-weight: bold; text-shadow: 0 0 20px gold; }
        .coin-box { width: 240px; height: 240px; margin: 20px auto; position: relative; }
        .gold-coin { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: url('coin.png') center/cover no-repeat; 
            border: 4px solid gold; box-shadow: 0 0 30px #8a2be2;
            transition: transform 0.1s; animation: rotate 15s linear infinite;
        }
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .gold-coin:active { transform: scale(0.9); }
        .btn-group { display: flex; flex-direction: column; gap: 15px; padding: 20px; align-items: center; }
        .main-btn { background: linear-gradient(to right, #4b0082, #8a2be2); border: 2px solid gold; color: white; width: 90%; padding: 15px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .sub-text { font-size: 0.85rem; color: #bbb; margin-top: -10px; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <select class="lang-select" id="lang" onchange="updateLang()">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
    <button class="wallet-btn" onclick="alert(t[cur].wMsg)">👛 <span id="wBtn">المحفظة</span></button>
</div>

<div class="counter" id="bal">0.000</div>

<div class="coin-box">
    <div class="gold-coin"></div>
</div>

<div class="btn-group">
    <button class="main-btn" id="mBtn" onclick="doMine()">تعدين رئيسي</button>
    <p class="sub-text" id="mSub">+1 عملة كل 24 ساعة</p>
    
    <button class="main-btn" id="bBtn" onclick="doBoost()">تعزيز (<span id="bLeft">7</span>/7)</button>
    <p class="sub-text" id="bSub">0.005 لكل تعزيز</p>
    
    <button class="main-btn" id="iBtn" onclick="doInvite()">إحالة صديق (+0.005)</button>
</div>

<script>
    const t = {
        ar: { w: "المحفظة", wMsg: "السحب قريبآ ⏳", m: "تعدين رئيسي", mSub: "+1 عملة كل 24 ساعة", b: "تعزيز", bSub: "0.005 لكل تعزيز", i: "إحالة صديق", s: "تم بنجاح!", l: "انتظر 24 ساعة" },
        en: { w: "Wallet", wMsg: "Withdrawal soon ⏳", m: "Main Mine", mSub: "+1 coin every 24h", b: "Boost", bSub: "0.005 per boost", i: "Invite Friend", s: "Success!", l: "Wait 24h" },
        zh: { w: "钱包", wMsg: "即将提现 ⏳", m: "主挖掘", mSub: "每24小时+1币", b: "加速", bSub: "每次+0.005", i: "邀请朋友", s: "成功!", l: "等24小时" },
        fa: { w: "کیف پول", wMsg: "برداشت به زودی ⏳", m: "استخراج اصلی", mSub: "+1 سکه هر 24 ساعت", b: "تقویت", bSub: "0.005 برای هر تقویت", i: "ارجاع دوستان", s: "موفقیت!", l: "24 ساعت صبر کنید" }
    };

    let cur = localStorage.getItem('lang') || 'ar';
    let balance = parseFloat(localStorage.getItem('bal')) || 0;
    let lastM = parseInt(localStorage.getItem('lastM')) || 0;
    let bCount = parseInt(localStorage.getItem('bCount')) || 7;
    let lastBReset = parseInt(localStorage.getItem('lastB')) || Date.now();

    function updateLang() {
        cur = document.getElementById('lang').value;
        localStorage.setItem('lang', cur);
        document.getElementById('wBtn').innerText = t[cur].w;
        document.getElementById('mBtn').innerText = t[cur].m;
        document.getElementById('mSub').innerText = t[cur].mSub;
        document.getElementById('bBtn').innerHTML = `${t[cur].b} (<span id="bLeft">${bCount}</span>/7)`;
        document.getElementById('bSub').innerText = t[cur].bSub;
        document.getElementById('iBtn').innerText = t[cur].i;
    }

    function doMine() {
        if (Date.now() - lastM > 86400000) {
            balance += 1; lastM = Date.now(); save(); alert(t[cur].s); render();
        } else { alert(t[cur].l); }
    }

    function doBoost() {
        if (Date.now() - lastBReset > 86400000) { bCount = 7; lastBReset = Date.now(); }
        if (bCount > 0) {
            balance += 0.005; bCount--; save(); render();
        } else { alert(t[cur].l); }
    }

    function doInvite() {
        window.open("https://t.me Play 💰 Join Me!");
    }

    function save() {
        localStorage.setItem('bal', balance);
        localStorage.setItem('lastM', lastM);
        localStorage.setItem('bCount', bCount);
        localStorage.setItem('lastB', lastBReset);
    }

    function render() {
        document.getElementById('bal').innerText = balance.toFixed(3);
        document.getElementById('bLeft').innerText = bCount;
    }

    document.getElementById('lang').value = cur;
    updateLang(); render();
</script>
</body>
</html>
