<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Official</title>
    <script src="https://telegram.org"></script>
    <script src="https://profitablecpmratenetwork.com" async></script>
    <style>
        body { 
            background: #000; color: white; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        .counter-box { margin-top: 40px; text-align: center; z-index: 100; }
        #bal { font-size: 3.5rem; color: #ffd700; font-weight: bold; text-shadow: 0 0 15px gold; }
        
        /* الحاوية الرئيسية التي تحمل صورتك */
        .app-container {
            position: relative; width: 350px; height: 350px; margin-top: 20px;
            background: url('coin.png') center/contain no-repeat; /* صورتك الأصلية */
        }

        /* أزرار شفافة فوق الصورة في أماكنها الصحيحة */
        .invisible-btn {
            position: absolute; width: 85px; height: 85px;
            border-radius: 50%; cursor: pointer; background: rgba(255,255,255,0); /* شفافة تماماً */
        }
        .invisible-btn:active { background: rgba(255, 215, 0, 0.15); transform: scale(0.95); }

        /* ضبط أماكن الأزرار حسب تصميم الصورة */
        #btn-mine   { top: 110px; right: 20px; }  /* زر التعدين */
        #btn-boost  { bottom: 80px; right: 40px; } /* زر التعزيز */
        #btn-invite { top: 110px; left: 20px; }   /* زر الإحالة */
        #btn-wallet { bottom: 80px; left: 40px; }  /* زر المحفظة */

        .status-msg { margin-top: 20px; color: #ffd700; font-size: 0.9rem; z-index: 100; }
    </style>
</head>
<body>

<div class="counter-box">
    <div id="bal">0.000000</div>
    <div style="color:#888; letter-spacing:2px; font-size:0.8rem;">GDAFi TOKENS</div>
</div>

<div class="app-container">
    <!-- الأزرار تعمل الآن فوق الصورة مباشرة -->
    <div class="invisible-btn" id="btn-mine" onclick="startMine()"></div>
    <div class="invisible-btn" id="btn-boost" onclick="doBoost()"></div>
    <div class="invisible-btn" id="btn-invite" onclick="invite()"></div>
    <div class="invisible-btn" id="btn-wallet" onclick="tg.showAlert('السحب قريباً')"></div>
</div>

<div class="status-msg" id="st">انقر على زر "تعدين" في الصورة للبدء</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = parseFloat(localStorage.getItem('g_b')) || 0;
    let isMining = localStorage.getItem('g_im') === 'true';
    let bLeft = parseInt(localStorage.getItem('g_bl')) ?? 7;
    let bReset = parseInt(localStorage.getItem('g_br')) || Date.now();

    function updateUI() {
        document.getElementById('bal').innerText = balance.toFixed(6);
        document.getElementById('st').innerText = isMining ? `جاري التعدين.. التعزيزات: ${bLeft}/7` : `التعدين متوقف.. التعزيزات: ${bLeft}/7`;
        localStorage.setItem('g_b', balance);
        localStorage.setItem('g_im', isMining);
        localStorage.setItem('g_bl', bLeft);
    }

    function startMine() {
        isMining = true;
        tg.HapticFeedback.notificationOccurred('success');
        updateUI();
    }

    function doBoost() {
        if(bLeft > 0) {
            balance += 0.005; bLeft--;
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        } else { tg.showAlert("انتهت تعزيزات اليوم!"); }
    }

    function invite() {
        const link = "https://t.me" + encodeURIComponent("انضم إلينا في تعدين GddaFi!");
        tg.openTelegramLink(link);
    }

    // محرك العملة (1 عملة كل 24 ساعة)
    setInterval(() => {
        if (Date.now() - bReset > 86400000) { bLeft = 7; bReset = Date.now(); localStorage.setItem('g_br', bReset); }
        if(isMining) { balance += (1 / 86400); updateUI(); }
    }, 1000);

    updateUI();
</script>
</body>
</html>
