<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Global Pro</title>
    <!-- مكتبة تليجرام الرسمية لحل مشكلة الإحالة -->
    <script src="https://telegram.org"></script>
    <!-- كود أرباح Adsterra -->
    <script src="https://profitablecpmratenetwork.com"></script>
    <style>
        :root { --gold: #ffd700; --royal: #b8860b; }
        body { background: #05000a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; border: 4px double var(--royal); box-sizing: border-box; }
        .header { width: 100%; display: flex; justify-content: space-between; padding: 12px 15px; box-sizing: border-box; }
        .wallet-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .counter-section { margin-top: 5px; text-align: center; }
        .counter { font-size: 3.5rem; color: var(--gold); font-weight: bold; text-shadow: 0 0 25px gold; line-height: 1.1; }
        .currency { font-size: 0.8rem; color: #888; letter-spacing: 2px; margin-top: 5px; }
        .coin-box { width: 190px; height: 190px; margin: 15px auto; perspective: 1000px; }
        .gold-coin { width: 100%; height: 100%; border-radius: 50%; background: url('coin.png') center/cover no-repeat; border: 4px solid var(--royal); box-shadow: 0 0 35px rgba(138, 43, 226, 0.4); animation: rotateY 15s linear infinite; }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .fakhama-title { font-size: 1.3rem; font-weight: bold; color: var(--gold); margin: 5px 0; letter-spacing: 3px; }
        .btn-list { display: flex; flex-direction: column; gap: 8px; width: 85%; }
        .action-btn { background: linear-gradient(45deg, #1a0033, #4b0082); border: 2px solid var(--gold); color: white; padding: 12px; border-radius: 35px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .hint { font-size: 0.7rem; color: #bbb; margin-top: -6px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 45px; background: #000; border-top: 1px solid var(--royal); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #555; font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <button class="wallet-btn" id="wBtn" onclick="showWalletMsg()">🏦 المحفظة</button>
    <select id="langSelect" onchange="changeLang(this.value)" style="background:#000; color:gold; border:1px solid gold; font-size:12px; border-radius:5px; padding:2px;">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
</div>

<div class="counter-section">
    <div class="counter" id="balDisplay">0.000000</div>
    <div class="currency">GDAFi TOKENS</div>
</div>

<div class="coin-box"><div class="gold-coin"></div></div>
<div class="fakhama-title">COIN GDDAFI</div>

<div class="btn-list">
    <button class="action-btn" id="mBtn" onclick="startMining()">تعدين رئيسي</button>
    <p class="hint" id="mStatus">+1 عملة كل 24 ساعة</p>
    <button class="action-btn" id="bBtn" onclick="doBoost()">تعزيز (<span id="bLeft">7</span>/7)</button>
    <p class="hint" id="bStatus">0.005 لكل تعزيز</p>
    <button class="action-btn" id="iBtn" onclick="doInvite()">إحالة صديق (+0.005)</button>
</div>

<div class="nav-bar">
    <div class="nav-item" style="color:gold">🏠 <span id="navHome">الرئيسية</span></div>
    <div class="nav-item" onclick="alert('Soon')">⛏️ <span id="navMine">تعدين</span></div>
    <div class="nav-item" onclick="alert('Soon')">📋 <span id="navTasks">مهام</span></div>
    <div class="nav-item" onclick="doInvite()">👥 <span id="navFriends">أصدقاء</span></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const t = {
        ar: { w: "🏦 المحفظة", wMsg: "السحب قريبآ ⏳", m: "تعدين رئيسي", mS: "جاري التعدين... ⛏️", mA: "+1 عملة كل 24 ساعة", b: "تعزيز", bS: "0.005 لكل تعزيز", i: "إحالة صديق", s: "بدأ التعدين! 🚀", nH: "الرئيسية", nM: "تعدين", nT: "مهام", nF: "أصدقاء" },
        en: { w: "🏦 Wallet", wMsg: "Withdrawal soon ⏳", m: "Main Mine", mS: "Mining... ⛏️", mA: "+1 coin every 24h", b: "Boost", bS: "0.005 per boost", i: "Invite Friend", s: "Mining Started! 🚀", nH: "Home", nM: "Mine", nT: "Tasks", nF: "Friends" },
        zh: { w: "🏦 钱包", wMsg: "即将提现 ⏳", m: "主挖掘", mS: "挖掘中... ⛏️", mA: "每24小时+1币", b: "加速", bS: "每次+0.005", i: "邀请朋友", s: "开始挖掘! 🚀", nH: "首页", nM: "挖掘", nT: "任务", nF: "朋友" },
        fa: { w: "🏦 کیف پول", wMsg: "برداشت به زودی ⏳", m: "استخراج اصلی", mS: "در حال استخراج... ⛏️", mA: "+1 سکه هر 24 ساعت", b: "تقویت", bS: "0.005 برای هر تقویت", i: "ارجاع دوستان", s: "استخراج شروع شد! 🚀", nH: "خانه", nM: "استخراج", nT: "وظایف", nF: "دوستان" }
    };

    let cur = localStorage.getItem('g_lang') || 'ar';
    let balance = parseFloat(localStorage.getItem('g_bal')) || 0.000000;
    let isMining = localStorage.getItem('g_mining') === 'true';
    let mineStart = parseInt(localStorage.getItem('g_start')) || 0;
    let bLeft = parseInt(localStorage.getItem('g_bL')) ?? 7;
    let bReset = parseInt(localStorage.getItem('g_bR')) || Date.now();

    function changeLang(lang) { cur = lang; localStorage.setItem('g_lang', lang); updateUI(); }
    function showWalletMsg() { alert(t[cur].wMsg); }

    function updateUI() {
        const item = t[cur];
        document.getElementById('wBtn').innerText = item.w;
        document.getElementById('mBtn').innerText = item.m;
        document.getElementById('bBtn').innerHTML = `${item.b} (<span id="bLeft">${bLeft}</span>/7)`;
        document.getElementById('bStatus').innerText = item.bS;
        document.getElementById('iBtn').innerText = item.i;
        document.getElementById('navHome').innerText = item.nH;
        document.getElementById('navMine').innerText = item.nM;
        document.getElementById('navTasks').innerText = item.nT;
        document.getElementById('navFriends').innerText = item.nF;
        document.getElementById('langSelect').value = cur;
    }

    function startMining() { if (!isMining) { isMining = true; mineStart = Date.now(); save(); alert(t[cur].s); } }

    setInterval(() => {
        if (Date.now() - bReset > 86400000) { bLeft = 7; bReset = Date.now(); save(); }
        if (isMining) {
            let elapsed = Date.now() - mineStart;
            if (elapsed < 86400000) {
                balance += (1 / 86400);
                document.getElementById('mBtn').style.opacity = "0.5";
                document.getElementById('mStatus').innerText = t[cur].mS;
            } else { isMining = false; save(); }
        } else {
            document.getElementById('mBtn').style.opacity = "1";
            document.getElementById('mStatus').innerText = t[cur].mA;
        }
        document.getElementById('balDisplay').innerText = balance.toFixed(6);
        document.getElementById('bLeft').innerText = bLeft;
        save();
    }, 1000);

    function doBoost() {
        if (bLeft > 0) { balance += 0.005; bLeft--; save(); }
        else { alert(cur === 'ar' ? "انتظر التجديد" : "Wait for reset"); }
    }

    function doInvite() {
        const shareUrl = `https://t.me{encodeURIComponent(cur === 'ar' ? "انضم إلي في تعدين عملة القذافي واربح! 💰" : "Join me in mining GddaFi Coin! 💰")}`;
        tg.openTelegramLink(shareUrl);
    }

    function save() {
        localStorage.setItem('g_bal', balance); localStorage.setItem('g_mining', isMining);
        localStorage.setItem('g_start', mineStart); localStorage.setItem('g_bL', bLeft);
        localStorage.setItem('g_bR', bReset);
    }

    updateUI();
</script>
</body>
</html>
