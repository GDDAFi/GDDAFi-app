<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GddaFi Play PRO</title>

<!-- 💰 سكربت الإعلانات -->
<script src="https://pl29042900.profitablecpmratenetwork.com/67/d9/1b/67d91bfab7947c9808641625010d7e0c.js"></script>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg,#0a001a,#1a0033);
    color: #fff;
    text-align: center;
    font-family: sans-serif;
}

.counter {
    font-size: 3rem;
    color: gold;
    margin-top: 40px;
}

.coin {
    width: 220px;
    height: 220px;
    margin: 20px auto;
    border-radius: 50%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/7/7b/Libyan_gold_dinar_concept.jpg') center/cover;
    animation: spin 6s linear infinite;
}

@keyframes spin {
    from {transform: rotateY(0);}
    to {transform: rotateY(360deg);}
}

button {
    padding: 15px 25px;
    margin: 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.mine { background: purple; color: #fff; }
.boost { background: gold; }
.ref { border: 1px dashed gold; padding: 10px; }
</style>
</head>

<body>

<div class="counter" id="balance">0.000000</div>
<div class="coin"></div>

<button class="mine" onclick="handleAction('mine')">⛏ تعدين يومي</button>
<button class="boost" onclick="handleAction('boost')">⚡ تعزيز</button>
<div class="ref" onclick="copyRef()">👥 دعوة +0.05</div>

<p id="refLink"></p>

<script>
// ================== نظام البيانات ==================
const DAY = 86400000;
const MINUTE = 60000;

let user = JSON.parse(localStorage.getItem("user")) || {
    balance: 0,
    rate: 1,
    lastMine: 0,
    lastBoost: 0,
    boostsUsed: 0,
    referrals: 0,
    id: generateID()
};

// ================== توليد ID ==================
function generateID() {
    return 'user-' + Math.random().toString(36).substr(2,9);
}

// ================== حفظ ==================
function save() {
    localStorage.setItem("user", JSON.stringify(user));
}

// ================== تحديث الواجهة ==================
function updateUI() {
    document.getElementById("balance").innerText = user.balance.toFixed(6);

    const link = location.origin + location.pathname + "?ref=" + user.id;
    document.getElementById("refLink").innerText = link;
}

// ================== نظام الإعلانات ==================
function showAd() {
    try {
        if (typeof window.show_8641625 === "function") {
            window.show_8641625();
        }
    } catch(e){}
}

// ================== الحماية ==================
let lock = false;

function protect() {
    if (lock) return false;
    lock = true;
    setTimeout(()=> lock=false,2000);
    return true;
}

// ================== التعدين ==================
function mine() {
    let now = Date.now();

    if (now - user.lastMine < DAY) {
        alert("⏳ مرة كل 24 ساعة فقط");
        return;
    }

    user.balance += user.rate;
    user.lastMine = now;

    save();
    updateUI();
    alert("💰 تم التعدين");
}

// ================== التعزيز ==================
function boost() {
    let now = Date.now();

    if (now - user.lastBoost < DAY) {
        alert("⏳ مرة يومياً فقط");
        return;
    }

    user.lastBoost = now;
    save();

    let count = 0;

    let interval = setInterval(() => {
        user.rate += 0.02;
        count++;

        if (count >= 7) {
            clearInterval(interval);
            save();
            alert("✅ انتهت التعزيزات");
        }
    }, MINUTE);

    alert("⚡ بدأ التعزيز");
}

// ================== الإحالة ==================
function checkReferral() {
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");

    if (ref && ref !== user.id && !localStorage.getItem("ref_used")) {
        user.balance += 0.05;
        user.referrals += 1;

        localStorage.setItem("ref_used", true);

        save();
        alert("🎉 حصلت على 0.05 من الإحالة");
    }
}

// ================== نسخ رابط الدعوة ==================
function copyRef() {
    const link = location.origin + location.pathname + "?ref=" + user.id;

    navigator.clipboard.writeText(link);
    alert("📋 تم نسخ رابط الدعوة");
}

// ================== التحكم ==================
function handleAction(type) {
    if (!protect()) return;

    showAd();

    if (type === "mine") mine();
    if (type === "boost") boost();
}

// ================== كشف الغش ==================
setInterval(() => {
    const now = Date.now();

    if (user.lastMine > now || user.lastBoost > now) {
        alert("🚫 تم اكتشاف تلاعب بالوقت");
        localStorage.clear();
        location.reload();
    }
}, 5000);

// ================== تشغيل ==================
checkReferral();
updateUI();
</script>

</body>
</html>
