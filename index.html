<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Crypto Pro</title>
    
    <!-- ✅ كود أرباح Adsterra الخاص بك -->
    <script src="https://pl29042900.profitablecpmratenetwork.com/67/d9/1b/67d91bfab7947c9808641625010d7e0c.js"></script>
    
    <!-- ✅ مكتبة تليجرام الرسمية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root { --gold: #ffd700; --royal: #b8860b; }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }
        
        body {
            background: #05000a;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            border: 1.5px solid var(--royal);
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(184, 134, 11, 0.5);
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            align-items: center;
        }

        .wallet-btn {
            background: #111;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }

        .sound-btn {
            background: #111;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }

        .counter-box {
            margin-top: 10px;
            text-align: center;
        }

        .counter {
            font-size: 3rem;
            color: var(--gold);
            font-weight: 800;
            text-shadow: 0 0 20px gold;
            line-height: 1;
        }

        .currency {
            font-size: 0.75rem;
            color: #777;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .coin-aura {
            width: 190px;
            height: 190px;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
        }

        .gold-coin {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: url('coin.png') center/cover no-repeat, radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: 1.5px solid var(--gold);
            animation: rotateY 15s linear infinite;
            cursor: pointer;
        }

        @keyframes rotateY {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .fakhama-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 85%;
        }

        .action-btn {
            background: linear-gradient(135deg, #1a0033, #330066);
            border: 1px solid var(--gold);
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }

        .action-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .hint-text {
            text-align: center;
            font-size: 0.65rem;
            color: #888;
            margin-top: -5px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 15px;
            width: 92%;
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 0.5px solid rgba(184, 134, 11, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .nav-link {
            color: #555;
            font-size: 0.6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: 0.3s;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .nav-link.active {
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .nav-link b {
            font-size: 18px;
            display: block;
        }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; gap: 8px;">
        <button id="txt-wallet" class="wallet-btn">🏦 المحفظة</button>
        <button id="soundToggle" class="sound-btn">🔊 إيقاف الصوت</button>
    </div>
    <select id="langSelect" style="background:#000; color:gold; border:1px solid gold; border-radius:5px; padding:3px; font-size:10px;">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
</div>

<div class="counter-box">
    <div class="counter" id="balDisplay">0.000000</div>
    <div id="txt-tokens" class="currency">GDAFi TOKENS</div>
</div>

<div class="coin-aura">
    <div class="gold-coin" id="coinImg"></div>
</div>

<div id="txt-title" class="fakhama-title">COIN GDDAFI</div>

<div class="btn-list">
    <button class="action-btn" id="mBtn">تعدين رئيسي</button>
    <p class="hint-text" id="mStatus">+1 عملة كل 24 ساعة</p>
    
    <button class="action-btn" id="boostBtn">تعزيز (<span id="bLeft">7</span>/7)</button>
    
    <button class="action-btn" id="txt-invite">إحالة صديق (+0.005)</button>
</div>

<div class="bottom-nav">
    <div class="nav-link active" data-tab="home"><b>🏠</b> <span id="nav-home">الرئيسية</span></div>
    <div class="nav-link" data-tab="mine"><b>⛏️</b> <span id="nav-mine">تعدين</span></div>
    <div class="nav-link" data-tab="tasks"><b>📋</b> <span id="nav-tasks">مهام</span></div>
    <div class="nav-link" data-tab="friends"><b>👥</b> <span id="nav-friends">أصدقاء</span></div>
</div>

<script>
    (function() {
        // ---------- تهيئة آمنة لتليجرام ----------
        let tg;
        try {
            tg = window.Telegram?.WebApp;
            if (!tg) throw new Error();
            tg.ready();
            tg.expand();
        } catch(e) {
            tg = {
                ready: () => {},
                expand: () => {},
                close: () => {},
                showAlert: (msg) => alert(msg),
                showConfirm: (msg, callback) => { callback(confirm(msg)); },
                HapticFeedback: { impactOccurred: () => {} },
                openTelegramLink: (url) => window.open(url, '_blank')
            };
        }
        window.tg = tg;

        // ---------- نظام الصوت (المطر والرعد باستخدام Web Audio API) ----------
        let audioCtx = null;
        let rainGain = null;
        let thunderGain = null;
        let isSoundOn = false;
        let rainInterval = null;
        let thunderTimeout = null;
        let soundAllowed = false; // لا يسمح بتشغيل الصوت إلا بعد تفاعل المستخدم

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                rainGain = audioCtx.createGain();
                thunderGain = audioCtx.createGain();
                rainGain.gain.value = 0;
                thunderGain.gain.value = 0;
                rainGain.connect(audioCtx.destination);
                thunderGain.connect(audioCtx.destination);
            } catch(e) { console.warn("Web Audio not supported"); }
        }

        // صوت المطر: قطيرات عشوائية سريعة
        function playRainDrop() {
            if (!audioCtx || !isSoundOn || !soundAllowed) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 2000 + Math.random() * 1000;
            gain.gain.value = 0.03 + Math.random() * 0.05;
            osc.connect(gain);
            gain.connect(rainGain);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.stop(now + 0.2);
        }

        // صوت الرعد: نغمة منخفضة عميقة مع تشويه
        function playThunder() {
            if (!audioCtx || !isSoundOn || !soundAllowed) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 80 + Math.random() * 40;
            gain.gain.value = 0.4;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 200;
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(thunderGain);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
            osc.stop(now + 1.5);
            // اهتزاز خفيف للتردد
            osc.frequency.exponentialRampToValueAtTime(30, now + 0.8);
        }

        function startRain() {
            if (rainInterval) clearInterval(rainInterval);
            rainInterval = setInterval(() => {
                if (isSoundOn && soundAllowed) playRainDrop();
            }, 150);
        }

        function stopRain() {
            if (rainInterval) clearInterval(rainInterval);
            rainInterval = null;
        }

        function scheduleThunder() {
            if (thunderTimeout) clearTimeout(thunderTimeout);
            const delay = 20000 + Math.random() * 20000; // 20-40 ثانية
            thunderTimeout = setTimeout(() => {
                if (isSoundOn && soundAllowed) playThunder();
                scheduleThunder();
            }, delay);
        }

        function enableSound() {
            if (!audioCtx) initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    isSoundOn = true;
                    soundAllowed = true;
                    startRain();
                    scheduleThunder();
                    updateSoundButton();
                }).catch(e => console.warn);
            } else {
                isSoundOn = true;
                soundAllowed = true;
                startRain();
                scheduleThunder();
                updateSoundButton();
            }
        }

        function disableSound() {
            isSoundOn = false;
            stopRain();
            if (thunderTimeout) clearTimeout(thunderTimeout);
            thunderTimeout = null;
            updateSoundButton();
        }

        function toggleSound() {
            if (!soundAllowed) {
                enableSound();
                return;
            }
            if (isSoundOn) {
                disableSound();
            } else {
                enableSound();
            }
        }

        function updateSoundButton() {
            const btn = document.getElementById('soundToggle');
            if (isSoundOn && soundAllowed) btn.innerHTML = '🔊 إيقاف الصوت';
            else btn.innerHTML = '🔇 تشغيل الصوت';
        }

        // تفعيل الصوت عند أول نقرة من المستخدم
        function firstInteraction() {
            if (!soundAllowed) {
                enableSound();
            }
        }

        // ربط أول تفاعل مع أي مكان في الصفحة
        document.body.addEventListener('click', firstInteraction, { once: true });
        // التأكد من أن الأزرار الرئيسية أيضاً تشغل الصوت
        const interactive = ['coinImg', 'mBtn', 'boostBtn', 'txt-invite', 'txt-wallet', 'langSelect', 'soundToggle'];
        interactive.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', firstInteraction);
        });

        document.getElementById('soundToggle').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSound();
        });

        // استعادة حالة الصوت من localStorage (إذا كان مفضلاً)
        const storedSound = localStorage.getItem('soundEnabled');
        if (storedSound === 'true') {
            // ننتظر أول نقرة لتفعيل الصوت تلقائياً
            soundAllowed = false;
            isSoundOn = false;
        } else {
            soundAllowed = false;
            isSoundOn = false;
        }

        // ---------- باقي كود اللعبة ----------
        let balance = 0.0;
        let bCount = 7;
        let isMining = false;
        let lastBoostDate = '';

        try {
            balance = parseFloat(localStorage.getItem('g_bal')) || 0.0;
            bCount = parseInt(localStorage.getItem('g_bCount')) || 7;
            isMining = localStorage.getItem('g_mining') === 'true';
            lastBoostDate = localStorage.getItem('g_lastBoostDate') || '';
        } catch(e) { console.warn(e); }

        const translations = {
            ar: {
                wallet: "🏦 المحفظة", tokens: "GDAFi TOKENS", title: "COIN GDDAFI",
                mine: "تعدين رئيسي", invite: "إحالة صديق (+0.005)", home: "الرئيسية",
                mining: "تعدين", tasks: "مهام", friends: "أصدقاء", boost: "تعزيز",
                miningStatus: "+1 عملة كل 24 ساعة", miningActive: "⚠️ التعدين نشط ⚠️",
                miningInactive: "🔴 التعدين متوقف 🔴"
            },
            en: {
                wallet: "🏦 Wallet", tokens: "GDAFi TOKENS", title: "COIN GDDAFI",
                mine: "Main Mining", invite: "Invite Friend (+0.005)", home: "Home",
                mining: "Mine", tasks: "Tasks", friends: "Friends", boost: "Boost",
                miningStatus: "+1 coin every 24h", miningActive: "⚠️ Mining Active ⚠️",
                miningInactive: "🔴 Mining Stopped 🔴"
            },
            zh: {
                wallet: "🏦 钱包", tokens: "GDAFi 代币", title: "GDDAFI 金币",
                mine: "开始采矿", invite: "邀请朋友 (+0.005)", home: "首页",
                mining: "采矿", tasks: "任务", friends: "朋友", boost: "增强",
                miningStatus: "每24小时 +1 币", miningActive: "⚠️ 挖矿中 ⚠️",
                miningInactive: "🔴 挖矿已停止 🔴"
            },
            fa: {
                wallet: "🏦 کیف پول", tokens: "توکن گدافی", title: "سکه گدافی",
                mine: "استخراج اصلی", invite: "دعوت دوستان (+0.005)", home: "خانه",
                mining: "استخراج", tasks: "وظایف", friends: "دوستان", boost: "تقویت",
                miningStatus: "+1 سکه هر ۲۴ ساعت", miningActive: "⚠️ استخراج فعال ⚠️",
                miningInactive: "🔴 استخراج متوقف 🔴"
            }
        };

        function updateUI() {
            document.getElementById('balDisplay').innerText = balance.toFixed(6);
            document.getElementById('bLeft').innerText = bCount;
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            if (t) {
                const statusText = isMining ? t.miningActive : t.miningInactive;
                document.getElementById('mStatus').innerHTML = t.miningStatus + '<br><small style="color:#ffaa00;">' + statusText + '</small>';
                document.getElementById('boostBtn').innerHTML = t.boost + ' (<span id="bLeft">' + bCount + '</span>/7)';
                document.getElementById('bLeft').innerText = bCount;
            }
        }

        function saveData() {
            try {
                localStorage.setItem('g_bal', balance.toFixed(6));
                localStorage.setItem('g_bCount', bCount);
                localStorage.setItem('g_mining', isMining);
                localStorage.setItem('g_lastBoostDate', lastBoostDate);
            } catch(e) { console.warn(e); }
        }

        function checkDailyReset() {
            const today = new Date().toDateString();
            if (lastBoostDate !== today) {
                bCount = 7;
                lastBoostDate = today;
                saveData();
                updateUI();
            }
        }

        function manualTap() {
            balance += 0.0001;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateUI();
            saveData();
        }

        function toggleMining() {
            if (!isMining) {
                tg.showConfirm("⚠️ هل تريد بدء التعدين السحابي؟ سيتم إضافة 1 عملة كل 24 ساعة.", (confirmed) => {
                    if (confirmed) {
                        isMining = true;
                        saveData();
                        updateUI();
                        tg.showAlert("✅ تم بدء التعدين!");
                    }
                });
            } else {
                tg.showConfirm("⛔ هل تريد إيقاف التعدين؟", (confirmed) => {
                    if (confirmed) {
                        isMining = false;
                        saveData();
                        updateUI();
                        tg.showAlert("🔴 تم إيقاف التعدين.");
                    }
                });
            }
        }

        function doBoost() {
            if (bCount > 0) {
                balance += 0.005;
                bCount--;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                updateUI();
                saveData();
                tg.showAlert("✨ تمت الإضافة! +0.005 GDAFi");
            } else {
                tg.showAlert("❗ نفذت التعزيزات المتاحة! عاود غداً.");
            }
        }

        function doInviteFriends() {
            const botUser = "GddaFiPlay_bot";
            const shareText = encodeURIComponent("🔥 انضم إلي في تعدين عملة القذافي واربح عملات مجانية! 🔥");
            const inviteLink = `https://t.me/share/url?url=https://t.me/${botUser}?start=ref_${Math.floor(Date.now() / 1000)}&text=${shareText}`;
            tg.openTelegramLink(inviteLink);
        }

        function changeLang() {
            const l = document.getElementById('langSelect').value;
            const t = translations[l];
            if (!t) return;
            document.getElementById('txt-wallet').innerText = t.wallet;
            document.getElementById('txt-tokens').innerText = t.tokens;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('mBtn').innerText = t.mine;
            document.getElementById('txt-invite').innerText = t.invite;
            document.getElementById('nav-home').innerText = t.home;
            document.getElementById('nav-mine').innerText = t.mining;
            document.getElementById('nav-tasks').innerText = t.tasks;
            document.getElementById('nav-friends').innerText = t.friends;
            updateUI();
        }

        let lastTimestamp = Date.now();
        setInterval(() => {
            if (isMining) {
                const now = Date.now();
                const secondsPassed = (now - lastTimestamp) / 1000;
                if (secondsPassed > 0 && secondsPassed < 5) {
                    balance += (1 / 86400) * secondsPassed;
                    updateUI();
                    saveData();
                }
                lastTimestamp = now;
            } else {
                lastTimestamp = Date.now();
            }
        }, 1000);

        setInterval(() => {
            checkDailyReset();
        }, 60000);

        document.getElementById('coinImg').addEventListener('click', manualTap);
        document.getElementById('mBtn').addEventListener('click', toggleMining);
        document.getElementById('boostBtn').addEventListener('click', doBoost);
        document.getElementById('txt-invite').addEventListener('click', doInviteFriends);
        document.getElementById('langSelect').addEventListener('change', changeLang);
        document.getElementById('txt-wallet').addEventListener('click', () => tg.showAlert("🔧 قريباً: ربط المحفظة الحقيقية"));

        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tab = btn.getAttribute('data-tab');
                if (tab === 'friends') {
                    doInviteFriends();
                } else if (tab === 'home') {
                    navLinks.forEach(l => l.classList.remove('active'));
                    btn.classList.add('active');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    tg.showAlert("✨ قريباً في التحديث القادم!");
                }
            });
        });

        checkDailyReset();
        updateUI();
        changeLang();
        updateSoundButton();

        window.addEventListener('beforeunload', () => {
            saveData();
            if (audioCtx) audioCtx.close();
        });
    })();
</script>
</body>
</html>
