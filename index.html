<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GddaFi Play - Mining</title>
    
    <!-- ✅ كود الربح الخاص بك (Adsterra) -->
    <script src="https://profitablecpmratenetwork.com"></script>
    
    <style>
        :root {
            --bg: linear-gradient(135deg, #1a0033 0%, #05000a 100%);
            --accent: #8a2be2;
            --gold: #ffd700;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        .lang-select { position: absolute; top: 20px; right: 20px; background: rgba(138,43,226,0.2); border: 1px solid var(--accent); color: white; padding: 8px; border-radius: 10px; cursor: pointer; z-index: 100; }
        .counter { font-size: 2.8rem; font-weight: bold; color: var(--gold); text-shadow: 0 0 25px rgba(255,215,0,0.8); margin-bottom: 10px; }
        .coin-box { width: 250px; height: 250px; perspective: 1000px; margin-bottom: 30px; position: relative; }
        .gold-coin { width: 100%; height: 100%; background: url('https://imgur.com') center/cover; border-radius: 50%; box-shadow: 0 0 60px rgba(255,215,0,0.4), inset 0 0 30px #ffd700; border: 5px solid #ffd700; animation: spin 5s linear infinite; }
        @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .mine-btn { background: linear-gradient(45deg, #4b0082, #8a2be2); border: none; color: white; padding: 20px 45px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(138, 43, 226, 0.6); }
    </style>
</head>
<body>

    <select class="lang-select" onchange="changeL(this.value)">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>

    <div class="counter" id="bal">0.000000</div>

    <div class="coin-box">
        <div class="gold-coin"></div>
    </div>

    <button class="mine-btn" id="mBtn" onclick="mineAction()">
        Mining Gaddafi tokens ♻️
    </button>

    <script>
        let b = 0.0;
        const rate = 1 / 86400; // سرعة عملة واحدة كل 24 ساعة
        setInterval(() => { b += rate; document.getElementById('bal').innerText = b.toFixed(6); }, 1000);

        function mineAction() {
            alert("تم بدء دورة التعدين! شاهد الإعلانات لزيادة أرباحك.");
            // كود الإعلان سيعمل تلقائياً من السكريبت في الرأس
        }

        function changeL(l) {
            const t = { ar:"تعدين عملات القذافي ♻️", en:"Mining Gaddafi tokens ♻️", zh:"开采卡扎菲代币 ♻️", fa:"استخراج توکن های قذافی ♻️" };
            document.getElementById('mBtn').innerText = t[l];
        }
    </script>
</body>
</html>
