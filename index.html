<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GddaFi Gold</title>

<!-- Ads -->
<script src="https://pl29042900.profitablecpmratenetwork.com/67/d9/1b/67d91bfab7947c9808641625010d7e0c.js"></script>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background: radial-gradient(circle, #1a0a2e, #05000a);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.container {
  max-width:420px;
  margin:30px auto;
  padding:20px;
  border-radius:30px;
  background:rgba(0,0,0,0.4);
  box-shadow:0 0 30px rgba(255,215,0,0.2);
}

.balance {
  font-size:2.5rem;
  color:gold;
  margin:15px;
  text-shadow:0 0 10px gold;
}

.coin {
  width:180px;
  height:180px;
  margin:20px auto;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 0 30px gold;
  cursor:pointer;
  animation: float 3s infinite ease-in-out;
}

.coin img {
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

button {
  margin:8px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#6a00ff,#8a2be2);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.stats {
  margin-top:10px;
  font-size:0.9rem;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

  <h2>💰 GddaFi Gold</h2>

  <div class="balance" id="balance">0.000000</div>

  <!-- صورة دينار القذافي -->
  <div class="coin" onclick="tapCoin()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Libyan_gold_dinar_coin.jpg">
  </div>

  <div class="stats">
    👥 الإحالات: <span id="refs">0</span>
  </div>

  <button onclick="mine()">⛏️ تعدين</button>
  <button onclick="daily()">🎁 يومي</button>
  <button onclick="boost()">⚡ تعزيز</button>
  <button onclick="copyRef()">👥 إحالة</button>

</div>

<script>
const BASE_RATE = 0.000003;
const REF_BONUS = 0.002;
const BOOST = 0.002;
const DAILY = 1;
const DAY = 86400000;
const MINUTE = 60000;

let data = JSON.parse(localStorage.getItem("game")) || {
  balance:0,
  refs:0,
  lastUpdate:Date.now(),
  lastDaily:0,
  lastBoost:0,
  boostsToday:0,
  uid:null
};

if(!data.uid){
  data.uid = Math.random().toString(36).substring(2);
}

function rate(){
  return BASE_RATE + (data.refs * REF_BONUS);
}

function save(){
  localStorage.setItem("game", JSON.stringify(data));
}

function updateBalance(){
  let now = Date.now();
  let diff = (now - data.lastUpdate)/1000;

  if(diff > 0 && diff < 3600){
    data.balance += rate() * diff;
  }

  data.lastUpdate = now;
}

function updateUI(){
  document.getElementById("balance").innerText = data.balance.toFixed(6);
  document.getElementById("refs").innerText = data.refs;
  save();
}

function showAd(){
  try{
    if(typeof show_8641625 === "function"){
      show_8641625();
    }
  }catch(e){}
}

function mine(){
  updateBalance();
  showAd();
  data.balance += 0.001;
  updateUI();
}

function daily(){
  let now = Date.now();

  if(now - data.lastDaily < DAY){
    alert("⏳ مش جاهز");
    return;
  }

  showAd();
  data.balance += DAILY;
  data.lastDaily = now;
  updateUI();
}

function boost(){
  let now = Date.now();

  if(data.boostsToday >= 7){
    alert("⚠️ خلصت التعزيزات");
    return;
  }

  if(now - data.lastBoost < MINUTE){
    alert("⏳ استنى دقيقة");
    return;
  }

  showAd();
  data.balance += BOOST;
  data.lastBoost = now;
  data.boostsToday++;
  updateUI();
}

function tapCoin(){
  data.balance += 0.00001;
  updateUI();
}

function copyRef(){
  const link = location.origin + location.pathname + "?ref=" + data.uid;
  navigator.clipboard.writeText(link);
  alert("✅ تم نسخ الرابط");
}

(function(){
  const params = new URLSearchParams(location.search);
  const ref = params.get("ref");

  if(ref && ref !== data.uid){
    if(!localStorage.getItem("ref_"+ref)){
      data.refs++;
      data.balance += 0.005;
      localStorage.setItem("ref_"+ref, "1");
    }
  }
})();

(function(){
  let lastReset = localStorage.getItem("reset") || 0;

  if(Date.now() - lastReset > DAY){
    data.boostsToday = 0;
    localStorage.setItem("reset", Date.now());
  }
})();

setInterval(()=>{
  updateBalance();
  updateUI();
},1000);

updateUI();
</script>

</body>
</html>
