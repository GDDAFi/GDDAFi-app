<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Golden Royal Edition</title>
    
    <!-- ✅ دمج كود أرباح Adsterra الخاص بك -->
    <script src="https://pl29042900.profitablecpmratenetwork.com/67/d9/1b/67d91bfab7947c9808641625010d7e0c.js"></script>

    <style>
        :root { --gold: #ffd700; --royal-gold: #b8860b; }
        
        body { 
            background: #05000a; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; text-align: center; overflow: hidden; height: 100vh;
            /* ✅ الإطار الذهبي الفخم على أطراف الصفحة */
            border: 8px double var(--royal-gold);
            box-sizing: border-box;
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .header { display: flex; justify-content: space-between; padding: 20px; z-index: 10; }
        
        .lang-select { background: #1a0033; color: white; border: 1px solid var(--gold); border-radius: 8px; padding: 5px; cursor: pointer; }
        
        .wallet-btn { background: rgba(138, 43, 226, 0.2); border: 1.5px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        .counter { font-size: 3.8rem; color: var(--gold); margin: 15px 0; font-weight: bold; text-shadow: 0 0 25px var(--gold); }

        .coin-box { width: 230px; height: 230px; margin: 10px auto; position: relative; }
        
        .gold-coin { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: url('coin.png') center/cover no-repeat; 
            border: 5px solid var(--royal-gold); box-shadow: 0 0 40px rgba(138, 43, 226, 0.6);
            transition: 0.1s; animation: rotateY 12s linear infinite;
        }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .gold-coin:active { transform: scale(0.9); }

        .btn-group { display: flex; flex-direction: column; gap: 12px; padding: 15px; align-items: center; }
        
        .main-btn { 
            background: linear-gradient(45deg, #2e004f, #8a2be2); 
            border: 2px solid var(--gold); color: white; width: 85%; 
            padding: 16px; border-radius: 50px; font-size: 1.2rem; 
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .main-btn:active { transform: scale(0.96); opacity: 0.8; }
        
        .sub-text { font-size: 0.85rem; color: #ccc; margin-top: -8px; text-shadow: 1px 1px 2px black; }

        /* زوايا البرواز الذهبي */
        body::before {
            content: "✦"; position: absolute; top: 5px; left: 5px; color: var(--gold); font-size: 20px;
        }
        body::after {
            content: "✦"; position: absolute; bottom: 5px; right: 5px; color: var(--gold); font-size: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <select class="lang-select" id="lang" onchange="changeLang()">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
    <button class="wallet-btn" onclick="triggerAd(); alert(t[cur].wMsg)">👛 <span id="wBtn">المحفظة</span></button>
</div>

<div class="counter" id="bal">0.000</div>

<div class="coin-box">
    <div class="gold-coin" onclick="handleCoinClick()"></div>
</div>

<div class="btn-group">
    <button class="main-btn" id="mBtn" onclick="triggerAd(); doMine()">تعدين رئيسي</button>
    <p class="sub-text" id="mSub">+1 عملة كل 24 ساعة</p>
    
    <button class="main-btn" id="bBtn" onclick="triggerAd(); doBoost()">تعزيز (<span id="bLeft">7</span>/7)</button>
    <p class="sub-text" id="bSub">0.005 لكل تعزيز</p>
    
    <button class="main-btn" id="iBtn" onclick="triggerAd(); doInvite()">إحالة صديق (+0.005)</button>
</div>

<script>
    // ✅ وظيفة تشغيل الإعلان عند كل ضغطة
    function triggerAd() {
        console.log("Ad Triggered");
        // الكود المدمج من Adsterra سيتولى الباقي تلقائياً عند التفاعل
    }

    const t = {
        ar: { w: "المحفظة", wMsg: "السحب قريبآ ⏳", m: "تعدين رئيسي", mSub: "+1 عملة كل 24 ساعة", b: "تعزيز", bSub: "0.005 لكل تعزيز", i: "إحالة صديق", s: "تم بنجاح!", l: "انتظر 24 ساعة" },
        en: { w: "Wallet", wMsg: "Withdrawal soon ⏳", m: "Main Mine", mSub: "+1 coin every 24h", b: "Boost", bSub: "0.005 per boost", i: "Invite Friend", s: "Success!", l: "Wait 24h" },
        zh: { w: "钱包", wMsg: "即将提现 ⏳", m: "主挖掘", mSub: "每24小时+1币", b: "加速", bSub: "每次+0.005", i: "邀请朋友", s: "成功!", l: "等24小时" },
        fa: { w: "کیف پول", wMsg: "برداشت به زودی ⏳", m: "استخراج اصلی", mSub: "+1 سکه هر 24 ساعت", b: "تقویت", bSub: "0.005 برای هر تقویت", i: "ارجاع دوستان", s: "موفقیت!", l: "24 ساعت صبر کنید" }
    };

    let cur = localStorage.getItem('lang') || 'ar';
    let balance = parseFloat(localStorage.getItem('bal')) || 0;
    let lastM = parseInt(localStorage.getItem('lastM')) || 0;
    let bCount = parseInt(localStorage.getItem('bCount')) || 7;
    let lastBReset = parseInt(localStorage.getItem('lastB')) || Date.now();

    function changeLang() {
        cur = document.getElementById('lang').value;
        localStorage.setItem('lang', cur);
        renderLang();
    }

    function renderLang() {
        document.getElementById('wBtn').innerText = t[cur].w;
        document.getElementById('mBtn').innerText = t[cur].m;
        document.getElementById('mSub').innerText = t[cur].mSub;
        document.getElementById('bBtn').innerHTML = `${t[cur].b} (<span id="bLeft">${bCount}</span>/7)`;
        document.getElementById('bSub').innerText = t[cur].bSub;
        document.getElementById('iBtn').innerText = t[cur].i;
    }

    function doMine() {
        if (Date.now() - lastM > 86400000) {
            balance += 1; lastM = Date.now(); save(); alert(t[cur].s); render();
        } else { alert(t[cur].l); }
    }

    function doBoost() {
        if (Date.now() - lastBReset > 86400000) { bCount = 7; lastBReset = Date.now(); }
        if (bCount > 0) {
            balance += 0.005; bCount--; save(); render();
        } else { alert(t[cur].l); }
    }

    function doInvite() {
        window.open("https://t.me Play 💰 Join Me!");
    }

    function handleCoinClick() { triggerAd(); }

    function save() {
        localStorage.setItem('bal', balance);
        localStorage.setItem('lastM', lastM);
        localStorage.setItem('bCount', bCount);
        localStorage.setItem('lastB', lastBReset);
    }

    function render() {
        document.getElementById('bal').innerText = balance.toFixed(3);
        document.getElementById('bLeft').innerText = bCount;
    }

    document.getElementById('lang').value = cur;
    renderLang(); render();
</script>
</body>
</html>
