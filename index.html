<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Crypto Pro</title>
    
    <!-- ✅ كود أرباح Adsterra الخاص بك -->
    <script src="https://profitablecpmratenetwork.com"></script>

    <style>
        :root { --gold: #ffd700; --royal: #b8860b; }
        body { 
            background: #05000a; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden; border: 5px double var(--royal); box-sizing: border-box;
        }
        .header { width: 100%; display: flex; justify-content: space-between; padding: 10px 15px; align-items: center; box-sizing: border-box; }
        .wallet-btn { background: #111; border: 1.5px solid var(--gold); color: var(--gold); padding: 6px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; }

        .counter-box { margin-top: 5px; text-align: center; }
        .counter { font-size: 4rem; color: var(--gold); font-weight: bold; text-shadow: 0 0 25px gold; line-height: 1; }
        .currency { font-size: 0.9rem; color: #888; letter-spacing: 2px; margin-top: 5px; }

        .coin-container { width: 190px; height: 190px; margin: 10px auto; position: relative; }
        .gold-coin { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: url('coin.png') center/cover no-repeat; 
            border: 4px solid var(--royal); box-shadow: 0 0 35px rgba(138, 43, 226, 0.4);
            animation: rotateY 12s linear infinite;
        }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* ✅ نص COIN GDDAFI الفخم */
        .fakhama-title { 
            font-size: 1.3rem; font-weight: bold; color: var(--gold); margin: 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); letter-spacing: 3px;
        }

        .btn-list { display: flex; flex-direction: column; gap: 8px; width: 85%; margin-top: 5px; }
        .action-btn { 
            background: linear-gradient(45deg, #2e004f, #8a2be2); border: 2px solid var(--gold);
            color: white; padding: 14px; border-radius: 35px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }
        .action-btn:active { transform: scale(0.96); }
        .hint-text { font-size: 0.75rem; color: #bbb; margin-top: -6px; }

        /* ✅ شريط التنقل السفلي الاحترافي والمصغر */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 50px; background: rgba(10, 0, 20, 0.98); 
            border-top: 1px solid var(--royal); display: flex; justify-content: space-around; align-items: center;
        }
        .nav-link { color: #555; font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .nav-link.active { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <button class="wallet-btn" onclick="adTrigger(); alert('السحب قريبآ ⏳')">🏦 المحفظة</button>
    <select onchange="location.reload()" style="background:#000; color:gold; border:1px solid gold; border-radius:5px; padding:3px;">
        <option>العربية 🇸🇦</option>
        <option>English 🇺🇸</option>
    </select>
</div>

<div class="counter-box">
    <div class="counter" id="bal">0.000000</div>
    <div class="currency">GDAFi TOKENS</div>
</div>

<div class="coin-container"><div class="gold-coin" onclick="adTrigger()"></div></div>
<div class="fakhama-title">COIN GDDAFI</div>

<div class="btn-list">
    <button class="action-btn" id="mBtn" onclick="startMiningProcess()">تعدين رئيسي</button>
    <p class="hint-text" id="mStatus">+1 عملة كل 24 ساعة</p>
    
    <button class="action-btn" onclick="doBoost()">تعزيز (7/7)</button>
    <p class="hint-text">0.005 لكل تعزيز</p>
    
    <button class="action-btn" onclick="doInviteFriends()">إحالة صديق (+0.005)</button>
</div>

<div style="height: 60px;"></div> <!-- مساحة أمان للأزرار -->

<div class="bottom-nav">
    <div class="nav-link active">🏠 <span>Home</span></div>
    <div class="nav-link" onclick="alert('Soon')">⛏️ <span>Mine</span></div>
    <div class="nav-link" onclick="alert('Soon')">📋 <span>Tasks</span></div>
    <div class="nav-link" onclick="doInviteFriends()">👥 <span>Friends</span></div>
</div>

<script>
    function adTrigger() { console.log("Ad Log"); }

    let balance = parseFloat(localStorage.getItem('g_bal')) || 1.320;
    let isMining = localStorage.getItem('g_mining') === 'true';
    let mineStart = parseInt(localStorage.getItem('g_start')) || 0;
    let bCount = parseInt(localStorage.getItem('g_bCount')) || 7;

    function startMiningProcess() {
        adTrigger();
        if (!isMining) {
            isMining = true; mineStart = Date.now(); save();
            alert("بدأ التعدين السحابي بنجاح! 🚀");
        } else { alert("التعدين يعمل حالياً..."); }
    }

    setInterval(() => {
        if (isMining) {
            let now = Date.now();
            if (now - mineStart < 86400000) {
                balance += (1 / 86400); // زيادة دقيقة جداً كل ثانية
                document.getElementById('mBtn').style.opacity = "0.5";
                document.getElementById('mStatus').innerText = "جاري التعدين... ⛏️";
            } else { isMining = false; save(); }
        } else {
            document.getElementById('mBtn').style.opacity = "1";
            document.getElementById('mStatus').innerText = "+1 عملة كل 24 ساعة";
        }
        document.getElementById('bal').innerText = balance.toFixed(6);
        save();
    }, 1000);

    function doBoost() {
        adTrigger();
        if (bCount > 0) { balance += 0.005; bCount--; save(); }
        else { alert("انتظر 24 ساعة لتجديد التعزيزات"); }
    }

    // ✅ الحل النهائي والحقيقي لزر الإحالة داخل تليجرام
    function doInviteFriends() {
        adTrigger();
        const botLink = "https://t.me";
        const shareMsg = encodeURIComponent("انضم إلي في تعدين عملة القذافي واربح! 💰");
        window.location.href = `https://t.me{botLink}&text=${shareMsg}`;
    }

    function save() {
        localStorage.setItem('g_bal', balance);
        localStorage.setItem('g_mining', isMining);
        localStorage.setItem('g_start', mineStart);
        localStorage.setItem('g_bCount', bCount);
    }
</script>
</body>
</html>
