<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Royal Edition</title>
    
    <!-- ✅ كود أرباح Adsterra الخاص بك -->
    <script src="https://profitablecpmratenetwork.com"></script>

    <style>
        :root { --gold: #ffd700; --royal: #b8860b; --purple: #8a2be2; }
        
        body { 
            background: #05000a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; text-align: center; overflow: hidden; height: 100vh;
            /* ✅ إطار ذهبي فخم ونظيف بدون رموز في الزوايا */
            border: 6px double var(--royal);
            box-sizing: border-box;
            box-shadow: inset 0 0 30px rgba(184, 134, 11, 0.4);
        }

        .header { display: flex; justify-content: space-between; padding: 25px 15px; align-items: center; }
        
        /* ✅ تصميم المحفظة الذهبي الجديد والفخم */
        .wallet-card { 
            background: linear-gradient(135deg, #b8860b 0%, #ffd700 100%);
            color: #1a0033; padding: 8px 18px; border-radius: 8px; 
            font-weight: bold; border: 1px solid #fff; cursor: pointer;
            box-shadow: 0 0 15px var(--gold); font-size: 14px;
            display: flex; align-items: center; gap: 5px;
        }

        .lang-select { background: rgba(138, 43, 226, 0.3); color: white; border: 1px solid var(--gold); border-radius: 8px; padding: 6px; cursor: pointer; }

        .counter { font-size: 4rem; color: var(--gold); margin: 15px 0; font-weight: bold; text-shadow: 0 0 25px var(--gold); letter-spacing: 2px; }

        .coin-box { width: 220px; height: 220px; margin: 10px auto; }
        .gold-coin { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: url('coin.png') center/cover no-repeat; 
            border: 4px solid var(--royal); box-shadow: 0 0 40px rgba(138, 43, 226, 0.5);
            animation: rotateY 12s linear infinite;
        }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .btn-group { display: flex; flex-direction: column; gap: 12px; padding: 15px; align-items: center; }
        
        .main-btn { 
            background: linear-gradient(45deg, #30005a, #8a2be2); 
            border: 2px solid var(--gold); color: white; width: 90%; 
            padding: 18px; border-radius: 50px; font-size: 1.2rem; 
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        .main-btn:active { transform: scale(0.95); opacity: 0.9; }
        
        .sub-text { font-size: 0.85rem; color: #ddd; margin-top: -8px; }
    </style>
</head>
<body>

<div class="header">
    <div class="wallet-card" onclick="triggerAd(); alert(t[cur].wMsg)">
        <span>💳</span> <span id="wBtn">Wallet</span>
    </div>
    <select class="lang-select" id="lang" onchange="changeLang()">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en" selected>English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
</div>

<div class="counter" id="bal">0.000</div>

<div class="coin-box">
    <div class="gold-coin" onclick="triggerAd()"></div>
</div>

<div class="btn-group">
    <button class="main-btn" id="mBtn" onclick="doMine()">Main Mine</button>
    <p class="sub-text" id="mSub">coin every 24h 1+</p>
    
    <button class="main-btn" id="bBtn" onclick="doBoost()">Boost (<span id="bLeft">7</span>/7)</button>
    <p class="sub-text" id="bSub">per boost 0.005</p>
    
    <button class="main-btn" id="iBtn" onclick="doInvite()">Invite Friend</button>
</div>

<script>
    // دالة الإعلانات
    function triggerAd() { console.log("Ad Request"); }

    const t = {
        ar: { w: "المحفظة", wMsg: "السحب قريبآ ⏳", m: "تعدين رئيسي", mSub: "+1 عملة كل 24 ساعة", b: "تعزيز", bSub: "0.005 لكل تعزيز", i: "إحالة صديق", s: "تم بنجاح!", l: "انتظر 24 ساعة" },
        en: { w: "Wallet", wMsg: "Withdrawal soon ⏳", m: "Main Mine", mSub: "coin every 24h 1+", b: "Boost", bSub: "per boost 0.005", i: "Invite Friend", s: "Success!", l: "Wait 24h" },
        zh: { w: "钱包", wMsg: "即将提现 ⏳", m: "主挖掘", mSub: "每24小时+1币", b: "加速", bSub: "每次+0.005", i: "邀请朋友", s: "成功!", l: "等24小时" },
        fa: { w: "کیف پول", wMsg: "برداشت به زودی ⏳", m: "استخراج اصلی", mSub: "+1 سکه هر 24 ساعت", b: "تقویت", bSub: "0.005 برای هر تقویت", i: "ارجاع دوستان", s: "موفقیت!", l: "24 ساعت صبر کنید" }
    };

    let cur = localStorage.getItem('lang') || 'en';
    let balance = parseFloat(localStorage.getItem('bal')) || 1.035;
    let lastM = parseInt(localStorage.getItem('lastM')) || 0;
    let bCount = parseInt(localStorage.getItem('bCount')) || 7;

    function changeLang() {
        cur = document.getElementById('lang').value;
        localStorage.setItem('lang', cur);
        renderLang();
    }

    function renderLang() {
        document.getElementById('wBtn').innerText = t[cur].w;
        document.getElementById('mBtn').innerText = t[cur].m;
        document.getElementById('mSub').innerText = t[cur].mSub;
        document.getElementById('bBtn').innerHTML = `${t[cur].b} (<span id="bLeft">${bCount}</span>/7)`;
        document.getElementById('bSub').innerText = t[cur].bSub;
        document.getElementById('iBtn').innerText = t[cur].i;
    }

    function doMine() {
        triggerAd();
        if (Date.now() - lastM > 86400000) {
            balance += 1; lastM = Date.now(); save(); alert(t[cur].s); render();
        } else { alert(t[cur].l); }
    }

    function doBoost() {
        triggerAd();
        if (bCount > 0) {
            balance += 0.005; bCount--; save(); render();
        } else { alert(t[cur].l); }
    }

    // ✅ إصلاح دالة الإحالة لتعمل داخل تليجرام 100%
    function doInvite() {
        triggerAd();
        const botUser = "GddaFiPlay_bot";
        const text = encodeURIComponent("GddaFi Play 💰\nابدأ التعدين واربح معي!");
        const url = "https://t.me" + botUser;
        window.location.href = "https://t.meshare/url?url=" + url + "&text=" + text;
    }

    function save() {
        localStorage.setItem('bal', balance);
        localStorage.setItem('lastM', lastM);
        localStorage.setItem('bCount', bCount);
    }

    function render() {
        document.getElementById('bal').innerText = balance.toFixed(3);
        document.getElementById('bLeft').innerText = bCount;
    }

    document.getElementById('lang').value = cur;
    renderLang(); render();
</script>
</body>
</html>
