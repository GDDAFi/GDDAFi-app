<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Royal Edition</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #ffd700; --bg: #05000a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .header { width: 92%; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .lang-sel { background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 8px; padding: 5px; font-size: 0.8rem; }
        .wallet-top { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #bal { font-size: 4rem; color: var(--gold); font-weight: bold; text-shadow: 0 0 25px gold; margin-top: 15px; }
        
        .image-container { width: 280px; height: 280px; margin: 25px auto; perspective: 1000px; }
        .main-coin { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
            border-radius: 50%;
        }
        /* كود الحركة الدائرية */
        .rotate-active { animation: spinCoin 15s linear infinite; }
        @keyframes spinCoin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 92%; margin-top: 5px; }
        .btn { 
            background: #000; border: 2px solid var(--gold); color: var(--gold); 
            padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 1rem; text-align: center;
        }
        .btn:active { background: var(--gold); color: #000; transform: scale(0.95); }
        .status { margin-top: 20px; color: #888; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <select class="lang-sel" id="lSel" onchange="setL(this.value)">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
    <button class="wallet-top" onclick="showW()">🏦 المحفظة</button>
</div>

<div id="bal">0.000000</div>
<div style="color:#666; font-size:0.8rem; letter-spacing: 3px; margin-top: -10px;">GDAFi TOKENS</div>

<div class="image-container">
    <img src="coin.png" id="coinImg" class="main-coin" alt="GddaFi">
</div>

<div class="controls">
    <button class="btn" id="mBtn" onclick="mine()">⛏️ ابدأ التعدين</button>
    <button class="btn" id="bBtn" onclick="boost()">⚡ تعزيز (7/7)</button>
    <button class="btn" onclick="showW()">💰 USDT/TRC20</button>
    <button class="btn" onclick="invite()">👥 إحالة صديق</button>
</div>

<div class="status" id="st">انقر على "ابدأ التعدين" لتنشيط العداد</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const DICT = {
        ar: { m:"ابدأ التعدين", ms:"جاري التعدين..", wMsg:"السحب قريبآ USDT/TRC20 ⏳", stA:"التعدين نشط (1 عملة/24س)" },
        en: { m:"Start Mining", ms:"Mining..", wMsg:"Withdrawal soon USDT/TRC20 ⏳", stA:"Mining Active (1 Coin/24h)" },
        zh: { m:"开始挖掘", ms:"挖掘中..", wMsg:"即将提现 USDT/TRC20 ⏳", stA:"挖掘进行中 (1币/24h)" },
        fa: { m:"شروع استخراج", ms:"در حال استخراج..", wMsg:"برداشت به زودی USDT/TRC20 ⏳", stA:"استخراج فعال (1 سکه/24س)" }
    };

    // استعادة البيانات بمسمياتك g_bal و g_bCount
    let balance = parseFloat(localStorage.getItem('g_bal')) || 0;
    let isMining = localStorage.getItem('g_mining') === 'true';
    let bCount = parseInt(localStorage.getItem('g_bCount')) ?? 7;
    let CUR = localStorage.getItem('g_lang') || 'ar';

    function setL(v) { CUR = v; localStorage.setItem('g_lang', v); updateUI(); }

    function updateUI() {
        const d = DICT[CUR];
        document.getElementById('bal').innerText = balance.toFixed(6);
        document.getElementById('mBtn').innerText = isMining ? d.ms : d.m;
        document.getElementById('bBtn').innerText = `⚡ تعزيز (${bCount}/7)`;
        document.getElementById('st').innerText = isMining ? d.stA : "انقر على ابدأ التعدين";
        document.getElementById('lSel').value = CUR;
        if(isMining) document.getElementById('coinImg').classList.add('rotate-active');
    }

    function mine() {
        if(!isMining) {
            isMining = true;
            tg.HapticFeedback.notificationOccurred('success');
            save(); updateUI();
        }
    }

    function boost() {
        if(bCount > 0) {
            balance += 0.005; bCount--;
            tg.HapticFeedback.impactOccurred('medium');
            save(); updateUI();
        } else { tg.showAlert("انتهت تعزيزات اليوم"); }
    }

    function showW() { tg.showAlert(DICT[CUR].wMsg); }

    function invite() {
        tg.openTelegramLink("https://t.me me!");
    }

    function save() {
        localStorage.setItem('g_bal', balance);
        localStorage.setItem('g_mining', isMining);
        localStorage.setItem('g_bCount', bCount);
    }

    // محرك التعدين (1 عملة كل 24 ساعة)
    setInterval(() => {
        if(isMining) {
            balance += (1 / 86400);
            document.getElementById('bal').innerText = balance.toFixed(6);
        }
    }, 1000);

    window.onload = updateUI;
</script>
</body>
</html>
