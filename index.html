<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Play - Fixed Pro</title>
    <!-- ✅ مكتبة تليجرام الرسمية - ضرورية جداً -->
    <script src="https://telegram.org"></script>
    <!-- ✅ كود أرباح Adsterra - سيعمل مع كل نقرة -->
    <script src="https://profitablecpmratenetwork.com"></script>
    <style>
        :root { --gold: #ffd700; --royal: #b8860b; }
        body { background: #05000a; color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; border: 4px double var(--royal); box-sizing: border-box; }
        .header { width: 100%; display: flex; justify-content: space-between; padding: 10px 15px; box-sizing: border-box; align-items: center; }
        .wallet-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .counter { font-size: 3.5rem; color: var(--gold); font-weight: bold; text-shadow: 0 0 25px gold; margin-top: 5px; line-height: 1; }
        .currency { font-size: 0.8rem; color: #888; letter-spacing: 2px; margin-top: 5px; }
        .coin-box { width: 190px; height: 190px; margin: 15px auto; }
        .gold-coin { width: 100%; height: 100%; border-radius: 50%; background: url('coin.png') center/cover no-repeat; border: 4px solid var(--royal); box-shadow: 0 0 35px rgba(138, 43, 226, 0.4); animation: rotateY 15s linear infinite; cursor: pointer; }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .fakhama { font-size: 1.3rem; font-weight: bold; color: var(--gold); margin: 5px 0; letter-spacing: 3px; }
        .btn-list { display: flex; flex-direction: column; gap: 8px; width: 85%; }
        .action-btn { background: linear-gradient(45deg, #1a0033, #4b0082); border: 2px solid var(--gold); color: white; padding: 12px; border-radius: 35px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .hint { font-size: 0.7rem; color: #bbb; margin-top: -6px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 45px; background: #000; border-top: 1px solid var(--royal); display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <button class="wallet-btn" onclick="ad(); alert(L[C].wMsg)">🏦 <span id="wTxt">المحفظة</span></button>
    <select id="lSel" onchange="setL(this.value)" style="background:#000; color:gold; border:1px solid gold; font-size:12px; border-radius:5px;">
        <option value="ar">العربية 🇸🇦</option>
        <option value="en">English 🇺🇸</option>
        <option value="zh">中文 🇨🇳</option>
        <option value="fa">فارسی 🇮🇷</option>
    </select>
</div>

<div class="counter" id="bal">0.000000</div>
<div class="currency">GDAFi TOKENS</div>

<div class="coin-box"><div class="gold-coin" onclick="ad()"></div></div>
<div class="fakhama">COIN GDDAFI</div>

<div class="btn-list">
    <button class="action-btn" id="mBtn" onclick="runM()">تعدين رئيسي</button>
    <p class="hint" id="mHint">+1 عملة كل 24 ساعة</p>
    <button class="action-btn" id="bBtn" onclick="runB()">تعزيز (7/7)</button>
    <p class="hint" id="bHint">0.005 لكل تعزيز</p>
    <button class="action-btn" id="iBtn" onclick="runI()">إحالة صديق (+0.005)</button>
</div>

<div class="nav-bar">
    <div style="color:gold; font-size:0.6rem;" id="nH">🏠 الرئيسية</div>
    <div style="color:#555; font-size:0.6rem;" onclick="alert('Soon')" id="nM">⛏️ تعدين</div>
    <div style="color:#555; font-size:0.6rem;" onclick="alert('Soon')" id="nT">📋 مهام</div>
    <div style="color:#555; font-size:0.6rem;" onclick="runI()" id="nF">👥 أصدقاء</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const L = {
        ar: { w: "المحفظة", wMsg: "السحب قريبآ ⏳", m: "تعدين رئيسي", mS: "جاري التعدين... ⛏️", mH: "+1 عملة كل 24 ساعة", b: "تعزيز", bH: "0.005 لكل تعزيز", i: "إحالة صديق (+0.005)", nH: "🏠 الرئيسية", nM: "⛏️ تعدين", nT: "📋 مهام", nF: "👥 أصدقاء" },
        en: { w: "Wallet", wMsg: "Withdrawal soon ⏳", m: "Main Mine", mS: "Mining... ⛏️", mH: "+1 coin every 24h", b: "Boost", bH: "0.005 per boost", i: "Invite Friend (+0.005)", nH: "🏠 Home", nM: "⛏️ Mine", nT: "📋 Tasks", nF: "👥 Friends" },
        zh: { w: "钱包", wMsg: "即将提现 ⏳", m: "主挖掘", mS: "挖掘中... ⛏️", mH: "每24小时+1币", b: "加速", bH: "每次+0.005", i: "邀请朋友 (+0.005)", nH: "🏠 首页", nM: "⛏️ 挖掘", nT: "📋 任务", nF: "👥 朋友" },
        fa: { w: "کیف پول", wMsg: "برداشت به زودی ⏳", m: "استخراج اصلی", mS: "در حال استخراج... ⛏️", mH: "+1 سکه هر 24 ساعت", b: "تقویت", bS: "0.005 برای هر تقویت", i: "ارجاع دوستان (+0.005)", nH: "🏠 خانه", nM: "⛏️ استخراج", nT: "📋 وظایف", nF: "👥 دوستان" }
    };

    let C = localStorage.getItem('g_l') || 'ar';
    let balance = parseFloat(localStorage.getItem('g_b')) || 0.000000;
    let isM = localStorage.getItem('g_im') === 'true';
    let mStart = parseInt(localStorage.getItem('g_ms')) || 0;
    let bL = parseInt(localStorage.getItem('g_bl')); if(isNaN(bL)) bL = 7;
    let bR = parseInt(localStorage.getItem('g_br')) || Date.now();

    function setL(v) { C = v; localStorage.setItem('g_l', v); upd(); }
    
    function upd() {
        const x = L[C];
        document.getElementById('wTxt').innerText = x.w;
        document.getElementById('mBtn').innerText = isM ? x.mS : x.m;
        document.getElementById('mHint').innerText = x.mH;
        document.getElementById('bBtn').innerText = x.b + " (" + bL + "/7)";
        document.getElementById('bHint').innerText = x.bH;
        document.getElementById('iBtn').innerText = x.i;
        document.getElementById('nH').innerText = x.nH;
        document.getElementById('nM').innerText = x.nM;
        document.getElementById('nT').innerText = x.nT;
        document.getElementById('nF').innerText = x.nF;
        document.getElementById('lSel').value = C;
    }

    function ad() { console.log("Ad Log"); }

    function runM() { ad(); if (!isM) { isM = true; mStart = Date.now(); save(); upd(); alert(L[C].s || "🚀"); } }

    function runB() { ad(); if (bL > 0) { balance += 0.005; bL--; save(); upd(); } else { alert("Wait 24h"); } }

    function runI() {
        ad();
        const shareUrl = "https://t.me" + encodeURIComponent(C === 'ar' ? "انضم إلي في تعدين عملة القذافي واربح! 💰" : "Join me in mining GddaFi Coin! 💰");
        if (tg.openTelegramLink) { tg.openTelegramLink(shareUrl); } else { window.location.href = shareUrl; }
    }

    function save() {
        localStorage.setItem('g_b', balance); localStorage.setItem('g_im', isM);
        localStorage.setItem('g_ms', mStart); localStorage.setItem('g_bl', bL);
        localStorage.setItem('g_br', bR);
    }

    setInterval(() => {
        if (Date.now() - bR > 86400000) { bL = 7; bR = Date.now(); save(); }
        if (isM) {
            if (Date.now() - mStart < 86400000) { balance += (1 / 86400); } 
            else { isM = false; save(); upd(); }
        }
        document.getElementById('bal').innerText = balance.toFixed(6);
        save();
    }, 1000);

    upd();
</script>
</body>
</html>
