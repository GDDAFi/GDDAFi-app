<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GddaFi Coin - Elite</title>
    <script src="https://telegram.org"></script>
    <script src="https://profitablecpmratenetwork.com" async></script>

    <style>
        :root { --gold: #ffd700; --royal: #b8860b; }
        body { 
            background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .header { margin-top: 20px; text-align: center; z-index: 10; }
        .counter { font-size: 3.8rem; color: var(--gold); font-weight: 900; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .currency { font-size: 1rem; color: #888; letter-spacing: 4px; margin-top: -10px; }

        /* حاوية العملة الرئيسية */
        .coin-container {
            position: relative; width: 360px; height: 360px; margin-top: 30px;
            background: url('https://github.io') center/contain no-repeat;
            border-radius: 50%; box-shadow: 0 0 50px rgba(184, 134, 11, 0.3);
        }

        /* مناطق النقر (Invisible Buttons over the image) */
        .touch-zone { position: absolute; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .touch-zone:active { background: rgba(255, 215, 0, 0.2); transform: scale(0.9); }

        #btn-mine { width: 80px; height: 80px; top: 120px; right: 25px; } /* منطقة "تعدين" */
        #btn-boost { width: 80px; height: 80px; bottom: 85px; right: 35px; } /* منطقة "تعزيز" */
        #btn-invite { width: 80px; height: 80px; top: 120px; left: 25px; } /* منطقة "إحالة" */
        #btn-wallet { width: 80px; height: 80px; bottom: 85px; left: 35px; } /* منطقة "محفظة" */

        .mining-pulse { animation: glow 2s infinite ease-in-out; }
        @keyframes glow { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3) drop-shadow(0 0 15px gold); } }

        .status-text { margin-top: 20px; font-size: 0.9rem; color: var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <div class="counter" id="bal">0.000000</div>
    <div class="currency">GDAFi TOKENS</div>
</div>

<div class="coin-container" id="mainCoin">
    <!-- الأزرار الشفافة فوق الصورة الأصلية -->
    <div class="touch-zone" id="btn-mine" onclick="startMine()"></div>
    <div class="touch-zone" id="btn-boost" onclick="doBoost()"></div>
    <div class="touch-zone" id="btn-invite" onclick="invite()"></div>
    <div class="touch-zone" id="btn-wallet" onclick="showWallet()"></div>
</div>

<div class="status-text" id="status">جاهز للبدء.. انقر على "تعدين"</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let balance = parseFloat(localStorage.getItem('g_b')) || 0;
    let bLeft = parseInt(localStorage.getItem('g_bl')) ?? 7;
    let isMining = localStorage.getItem('g_im') === 'true';
    let bReset = parseInt(localStorage.getItem('g_br')) || Date.now();

    function updateUI() {
        document.getElementById('bal').innerText = balance.toFixed(6);
        document.getElementById('status').innerText = isMining ? `جاري التعدين.. التعزيزات المتبقية: ${bLeft}/7` : `التعدين متوقف.. التعزيزات المتبقية: ${bLeft}/7`;
        if(isMining) document.getElementById('mainCoin').classList.add('mining-pulse');
        
        localStorage.setItem('g_b', balance);
        localStorage.setItem('g_bl', bLeft);
        localStorage.setItem('g_im', isMining);
        localStorage.setItem('g_br', bReset);
    }

    function startMine() {
        if(!isMining) {
            isMining = true;
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }
    }

    function doBoost() {
        if(bLeft > 0) {
            balance += 0.005;
            bLeft--;
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        } else {
            tg.showAlert("عد غداً لطلب تعزيزات جديدة (7/7)");
        }
    }

    function invite() {
        const botLink = "https://t.me";
        const shareLink = `https://t.me{encodeURIComponent(botLink)}&text=${encodeURIComponent("انضم لتعدين عملة GddaFi واربح! 💰")}`;
        tg.openTelegramLink(shareLink);
    }

    function showWallet() {
        tg.showAlert("السحب سيفتح قريباً عند الوصول لـ 100 عملة!");
    }

    // محرك التعدين (عملة واحدة كل 24 ساعة)
    setInterval(() => {
        // تصفير التعزيز كل 24 ساعة
        if (Date.now() - bReset > 86400000) {
            bLeft = 7; bReset = Date.now();
        }

        if(isMining) {
            balance += (1 / 86400); // إضافة 1 عملة مقسمة على ثواني اليوم
            updateUI();
        }
    }, 1000);

    updateUI();
</script>
</body>
</html>
